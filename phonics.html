function slugifyFileName(value) {
  return String(value || "article")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "") || "article";
}

function renderSpellMode(unit, correctCount, checkedCount) {
  const done = checkedCount === unit.words.length && correctCount === unit.words.length;
  return `
    <div class="score-board">
      <div class="score-pill">Correct <b>${correctCount}</b> / ${unit.words.length}</div>
      <div class="score-pill">Checked <b>${checkedCount}</b></div>
      <button class="utility-btn" onclick="resetSpell()">Reset</button>
    </div>
    <div class="complete ${done ? "show" : ""}">All words cleared.</div>
    <div class="challenge-grid">
      ${unit.words.map((word, index) => {
        const result = state.checked[index];
        const answer = state.answers[index] || "";
        return `
          <div class="challenge-card ${result === true ? "correct" : result === false ? "wrong" : ""}">
            <div class="challenge-head">
              <span>No. ${String(index + 1).padStart(2, "0")}</span>
              <button class="listen-btn" onclick="playSpellingWord(${index})" aria-label="Listen to word number ${index + 1}">
                <span class="listen-icon" aria-hidden="true">&#9654;</span>
                <span>Listen</span>
              </button>
            </div>
            <div class="challenge-form">
              <input class="challenge-input" id="answer-${index}" value="${escapeHtml(result === true ? word : answer)}" ${result === true ? "readonly" : ""} oninput="saveAnswer(${index}, this.value)" onkeydown="if(event.key==='Enter') checkAnswer(${index})" placeholder="Listen, then spell" aria-label="Spell word number ${index + 1}" autocomplete="off" autocapitalize="none" spellcheck="false">
              <div class="answer-feedback" aria-live="polite">${result === true ? "Great!" : result === false ? "Try again. Listen once more." : "Hear it as many times as you need."}</div>
              <button class="check-btn" onclick="checkAnswer(${index})">${result === true ? "Correct" : "Check"}</button>
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function renderListenMode(unit) {
  const word = unit.words[state.listenIndex] || unit.words[0];
  const selectedTokens = state.listenSelectedIds.map(id =>
    state.listenTiles.find(tile => tile.id === id)?.text || ""
  );
  const completedCount = Object.keys(state.listenCompleted).length;
  const feedback = state.listenStatus === "correct"
    ? "Pop! 잘 들었어요."
    : state.listenStatus === "wrong"
      ? "한 번 더 듣고 순서대로 눌러 보세요."
      : "소리를 듣고 블록을 순서대로 선택하세요.";

  return `
    <div class="score-board">
      <div class="score-pill">Listen Clear <b>${completedCount}</b> / ${unit.words.length}</div>
      <div class="score-pill">Word <b>${state.listenIndex + 1}</b></div>
      <button class="utility-btn" onclick="resetListenRound()">Reset</button>
    </div>
    <div class="listen-game">
      <div id="listenPopLayer" class="listen-pop-layer" aria-hidden="true"></div>
      <h3>Listen & Select</h3>
      <p class="listen-instruction">단어를 듣고 음가 블록을 차례대로 눌러 완성해요.</p>
      <button class="listen-play" type="button" onclick="playWord('${escapeHtml(word)}', { spelling: true })" aria-label="Listen to the target word">&#9654;</button>
      <div class="listen-slots">
        ${state.listenTokens.map((token, index) => `
          <span class="listen-slot ${selectedTokens[index] ? "filled" : ""}" data-slot-index="${index}">
            ${escapeHtml(selectedTokens[index] || "·")}
          </span>
        `).join("")}
      </div>
      <div class="letter-bank">
        ${state.listenTiles.map(tile => `
          <button class="letter-block ${state.listenSelectedIds.includes(tile.id) ? "used" : ""}"
            type="button"
            onclick="selectListenTile('${tile.id}')"
            ${state.listenStatus === "correct" ? "disabled" : ""}>
            ${escapeHtml(tile.text)}
          </button>
        `).join("")}
      </div>
      <p class="listen-feedback ${state.listenStatus}">${escapeHtml(feedback)}</p>
    </div>
  `;
}

function prepareListenRound(index = 0) {
  const unit = currentUnit();
  state.listenIndex = Math.max(0, Math.min(index, unit.words.length - 1));
  const word = unit.words[state.listenIndex];
  state.listenTokens = tokenizeListenWord(word, unit);
  state.listenTiles = makeListenTiles(state.listenTokens, word);
  state.listenSelectedIds = [];
  state.listenAttempts = 1;
  state.listenStatus = "ready";
}

function tokenizeListenWord(word, unit) {
  const commonChunks = [
    "tch", "dge", "igh", "scr", "spl", "spr", "str",
    "sh", "ch", "th", "wh", "ph", "ck", "ng", "nk", "qu",
    "ee", "ea", "ai", "ay", "oa", "ow", "oi", "oy", "ou",
    "aw", "au", "oo", "er", "ir", "ur", "ar", "or"
  ];
  const patterns = [...new Set([
    ...(unit.patterns || []),
    ...(unit.split || []),
    ...commonChunks
  ])]
    .filter(pattern => pattern && !pattern.includes("_"))
    .sort((a, b) => b.length - a.length);
  const lower = word.toLowerCase();
  const tokens = [];
  let index = 0;

  while (index < lower.length) {
    const match = patterns.find(pattern => lower.startsWith(pattern.toLowerCase(), index));
    if (match) {
      tokens.push(lower.slice(index, index + match.length));
      index += match.length;
    } else {
      tokens.push(lower[index]);
      index += 1;
    }
  }
  return tokens;
}

function makeListenTiles(tokens, word) {
  const distractors = [
    "a", "e", "i", "o", "u", "b", "d", "f", "g", "m", "n", "p",
    "r", "s", "t", "sh", "ch", "th", "ee", "ay", "oo"
  ];
  const seed = [...word].reduce((sum, letter) => sum + letter.charCodeAt(0), 0);
  const extras = [];
  for (let offset = 0; extras.length < 3 && offset < distractors.length; offset += 1) {
    const item = distractors[(seed + offset * 5) % distractors.length];
    if (!tokens.includes(item) && !extras.includes(item)) extras.push(item);
  }
  const values = [...tokens, ...extras];
  return values
    .map((text, index) => ({
      id: `${state.listenIndex}-${index}-${text}`,
      text,
      order: (seed * (index + 3) + index * 17) % 101
    }))
    .sort((a, b) => a.order - b.order);
}

function selectListenTile(tileId) {
  noteLearningActivity();
  if (state.listenStatus === "correct") return;
  const tile = state.listenTiles.find(item => item.id === tileId);
  if (!tile || state.listenSelectedIds.includes(tileId)) return;

  const expected = state.listenTokens[state.listenSelectedIds.length];
  if (tile.text !== expected) {
    state.listenAttempts += 1;
    state.listenStatus = "wrong";
    renderMain();
    playWrongEffect();
    window.setTimeout(() => {
      state.listenSelectedIds = [];
      state.listenStatus = "ready";
      renderMain();
      playWord(currentUnit().words[state.listenIndex], { spelling: true });
    }, 650);
    return;
  }

  state.listenSelectedIds.push(tileId);
  const filledIndex = state.listenSelectedIds.length - 1;
  if (state.listenSelectedIds.length < state.listenTokens.length) {
    state.listenStatus = "ready";
    renderMain();
    window.requestAnimationFrame(() => animateListenPop(filledIndex, false));
    return;
  }

  state.listenStatus = "correct";
  const word = currentUnit().words[state.listenIndex];
  state.listenCompleted[word] = true;
  renderMain();
  window.requestAnimationFrame(() => animateListenPop(filledIndex, true));
  completeListenWord(word);
}

function animateListenPop(slotIndex, isComplete) {
  const slot = document.querySelector(`.listen-slot[data-slot-index="${slotIndex}"]`);
  const layer = document.getElementById("listenPopLayer");
  const game = document.querySelector(".listen-game");
  if (!slot || !layer || !game) {
    playPopEffect(isComplete);
    return;
  }

  slot.classList.remove("pop-hit");
  void slot.offsetWidth;
  slot.classList.add("pop-hit");

  const slotRect = slot.getBoundingClientRect();
  const gameRect = game.getBoundingClientRect();
  const x = slotRect.left - gameRect.left + slotRect.width / 2;
  const y = slotRect.top - gameRect.top + slotRect.height / 2 + 85;
  const colors = ["#ff263d", "#17b7f1", "#7bd62d", "#ffe500", "#ff9f1c", "#9f7aea"];

  const popWord = document.createElement("span");
  popWord.className = `pop-word${isComplete ? " is-complete" : ""}`;
  popWord.textContent = isComplete ? "POP!" : "Pop!";
  popWord.style.setProperty("--pop-x", `${x}px`);
  popWord.style.setProperty("--pop-y", `${y}px`);
  layer.appendChild(popWord);

  const sparkCount = isComplete ? 12 : 7;
  for (let index = 0; index < sparkCount; index += 1) {
    const angle = (Math.PI * 2 * index) / sparkCount - Math.PI / 2;
    const distance = (isComplete ? 52 : 35) + (index % 3) * 8;
    const spark = document.createElement("i");
    spark.className = "pop-spark";
    spark.style.setProperty("--pop-x", `${x}px`);
    spark.style.setProperty("--pop-y", `${y}px`);
    spark.style.setProperty("--spark-x", `${Math.cos(angle) * distance}px`);
    spark.style.setProperty("--spark-y", `${Math.sin(angle) * distance}px`);
    spark.style.setProperty("--spark-rotate", `${90 + index * 37}deg`);
    spark.style.setProperty("--spark-color", colors[index % colors.length]);
    layer.appendChild(spark);
    window.setTimeout(() => spark.remove(), 850);
  }

  playPopEffect(isComplete);
  window.setTimeout(() => {
    popWord.remove();
    slot.classList.remove("pop-hit");
  }, isComplete ? 900 : 700);
}

async function completeListenWord(word) {
  const unit = currentUnit();
  const unitComplete = unit.words.every(item => state.listenCompleted[item]);
  const { data, error } = await authClient.rpc("record_listen_select_result", {
    p_section_key: state.book,
    p_unit_key: currentUnitKey(),
    p_unit_name: unit.name,
    p_word: word,
    p_attempt_count: state.listenAttempts,
    p_is_correct: true,
    p_unit_complete: unitComplete,
  });
  if (!error) {
    applyRewardResult(data);
    await loadGameState(false);
  }

  window.setTimeout(() => {
    if (unitComplete) {
      showLevelPop("Unit Clear!");
      prepareListenRound(0);
      state.listenCompleted = {};
    } else {
      const nextIndex = unit.words.findIndex(item => !state.listenCompleted[item]);
      prepareListenRound(nextIndex);
    }
    renderMain();
    playWord(currentUnit().words[state.listenIndex], { spelling: true });
  }, 900);
}

function resetListenRound() {
  noteLearningActivity();
  prepareListenRound(state.listenIndex);
  renderMain();
  playWord(currentUnit().words[state.listenIndex], { spelling: true });
}

function playSpellingWord(index) {
  const word = currentUnit().words[index];
  if (word) playWord(word, { spelling: true });
}

function selectBook(book) {
  finishActiveLearningSession(false);
  state.book = book;
  state.unitIndex = 0;
  state.mode = "study";
  state.selectedIndex = 0;
  state.sightIndex = 0;
  state.collabIndex = 0;
  state.answers = {};
  state.checked = {};
  state.articleDraft = null;
  state.articleStatus = "";
  resetListenState();
  resetLearningSessionState();
  renderApp();
  noteLearningActivity();
}

function selectUnit(index) {
  finishActiveLearningSession(false);
  state.unitIndex = index;
  state.mode = "study";
  state.selectedIndex = 0;
  state.sightIndex = 0;
  state.collabIndex = 0;
  state.answers = {};
  state.checked = {};
  state.articleDraft = null;
  state.articleStatus = "";
  resetListenState();
  resetLearningSessionState();
  renderApp();
  noteLearningActivity();
}

function selectWord(index) {
  noteLearningActivity();
  state.selectedIndex = index;
  const word = currentUnit().words[index];
  renderMain();
  trackStudyWord(word);
  playWord(word);
}

function selectSightWord(index) {
  noteLearningActivity();
  const words = currentUnit().sightWords || [];
  state.sightIndex = Math.max(0, Math.min(index, words.length - 1));
  const word = words[state.sightIndex];
  renderMain();
  playSightWord(word);
}

function playSightWord(word) {
  playWord(word);
}

function selectCollabPhrase(index) {
  noteLearningActivity();
  const phrases = makeCollabPhrases(currentUnit(), currentUnit().sightWords || []);
  state.collabIndex = Math.max(0, Math.min(index, phrases.length - 1));
  renderMain();
  playCollabPhrase(state.collabIndex);
}

function playCollabPhrase(index = state.collabIndex) {
  const phrases = makeCollabPhrases(currentUnit(), currentUnit().sightWords || []);
  const item = phrases[Math.max(0, Math.min(index, phrases.length - 1))];
  if (item) playPhrase(item.phrase);
}

function setMode(mode) {
  if (mode === "article" && !isAcademyStaff()) return;
  finishActiveLearningSession(false);
  state.mode = mode;
  if (mode === "sight") state.sightIndex = 0;
  if (mode === "collab") state.collabIndex = 0;
  state.answers = {};
  state.checked = {};
  resetListenState();
  resetLearningSessionState();
  renderMain();
  noteLearningActivity();
  if (mode === "spell") {
    window.setTimeout(() => playSpellingWord(0), 120);
  } else if (mode === "listen") {
    prepareListenRound(0);
    renderMain();
    window.setTimeout(() => playWord(currentUnit().words[0], { spelling: true }), 120);
  }
}

function resetListenState() {
  state.listenIndex = 0;
  state.listenTokens = [];
  state.listenTiles = [];
  state.listenSelectedIds = [];
  state.listenAttempts = 1;
  state.listenStatus = "ready";
  state.listenCompleted = {};
}

function saveAnswer(index, value) {
  noteLearningActivity();
  state.answers[index] = value;
}

function checkAnswer(index) {
  noteLearningActivity();
  const unit = currentUnit();
  const input = document.getElementById(`answer-${index}`);
  if (!input) return;
  const expected = unit.words[index].toLowerCase();
  const actual = input.value.trim().toLowerCase();
  state.answers[index] = input.value;
  state.checked[index] = actual === expected;
  trackSpellingAttempt(unit.words[index], state.checked[index]);
  renderMain();

  window.setTimeout(() => {
    if (state.checked[index]) {
      const nextIndex = unit.words.findIndex((_, idx) => state.checked[idx] !== true);
      const nextInput = document.getElementById(`answer-${nextIndex}`);
      if (nextInput) {
        nextInput.focus();
        playSpellingWord(nextIndex);
      }
      return;
    }

    const retryInput = document.getElementById(`answer-${index}`);
    if (retryInput) {
      retryInput.focus();
      retryInput.select();
    }
    playSpellingWord(index);
  }, 180);
}

function resetSpell() {
  finishActiveLearningSession(false);
  state.answers = {};
  state.checked = {};
  resetLearningSessionState();
  renderMain();
  noteLearningActivity();
  window.setTimeout(() => playSpellingWord(0), 120);
}

async function playPhrase(text) {
  const words = tokenizePhraseText(text).map(word => word.toLowerCase());
  if (!words.length) return;
  noteLearningActivity();

  const playbackId = ++ttsPlaybackId;
  stopRecordedAudio();
  if ("speechSynthesis" in window) window.speechSynthesis.cancel();

  const phraseStarted = await playRecordedPhrase(text, playbackId);
  if (phraseStarted || playbackId !== ttsPlaybackId) return;

  for (const word of words) {
    if (playbackId !== ttsPlaybackId) return;
    const played = await playRecordedWordToEnd(word, playbackId);
    if (!played) {
      await speakPhraseFallback(text, playbackId);
      return;
    }
    await wait(80);
  }
}

async function playRecordedPhrase(text, playbackId) {
  const audio = getCollabAudio(text);
  audio.onended = null;
  audio.onerror = null;
  audio.currentTime = 0;
  activeWordAudio = audio;

  try {
    await audio.play();
    return true;
  } catch (error) {
    if (activeWordAudio === audio) activeWordAudio = null;
    return false;
  }
}

async function playRecordedWordToEnd(word, playbackId) {
  const audio = getWordAudio(word);
  audio.onended = null;
  audio.onerror = null;
  audio.currentTime = 0;
  activeWordAudio = audio;

  try {
    await audio.play();
  } catch (error) {
    if (activeWordAudio === audio) activeWordAudio = null;
    return false;
  }

  return new Promise(resolve => {
    activeWordResolve = () => resolve(false);
    audio.onended = () => {
      audio.onended = null;
      audio.onerror = null;
      if (activeWordAudio === audio) activeWordAudio = null;
      activeWordResolve = null;
      resolve(playbackId === ttsPlaybackId);
    };
    audio.onerror = () => {
      audio.onended = null;
      audio.onerror = null;
      if (activeWordAudio === audio) activeWordAudio = null;
      activeWordResolve = null;
      resolve(false);
    };
  });
}

async function speakPhraseFallback(text, playbackId) {
  if (!("speechSynthesis" in window) || playbackId !== ttsPlaybackId) return;
  const voice = await getConsistentGoogleVoice();
  if (playbackId !== ttsPlaybackId) return;
  speakUtterance(`${text}.`, voice, 0.74);
}

function wait(ms) {
  return new Promise(resolve => window.setTimeout(resolve, ms));
}

async function playWord(text, options = {}) {
  const word = String(text || "").toLowerCase().trim();
  if (!word) return;
  noteLearningActivity();
  trackAudioReplay(word);

  const playbackId = ++ttsPlaybackId;
  stopRecordedAudio();
  if ("speechSynthesis" in window) window.speechSynthesis.cancel();

  const recordedStarted = await playRecordedWord(word, options, playbackId);
  if (recordedStarted || playbackId !== ttsPlaybackId) return;
  if (!("speechSynthesis" in window)) return;

  const voice = await getConsistentGoogleVoice();
  if (!options.spelling) {
    speakUtterance(`${word}.`, voice, 0.8);
    return;
  }

  const firstPass = speakUtterance(`${word}.`, voice, 0.72);
  firstPass.onend = () => {
    window.setTimeout(() => {
      if (playbackId !== ttsPlaybackId) return;
      speakUtterance(`${word}.`, voice, 0.62);
    }, 180);
  };
}

async function playRecordedWord(word, options, playbackId) {
  const firstPass = getWordAudio(word);
  firstPass.onended = null;
  firstPass.currentTime = 0;
  activeWordAudio = firstPass;

  if (options.spelling) {
    firstPass.onended = () => {
      recordedRepeatTimer = window.setTimeout(() => {
        if (playbackId !== ttsPlaybackId) return;
        firstPass.onended = null;
        firstPass.currentTime = 0;
        activeWordAudio = firstPass;
        firstPass.play().catch(() => {});
      }, 180);
    };
  }

  try {
    await firstPass.play();
    return true;
  } catch (error) {
    if (activeWordAudio === firstPass) activeWordAudio = null;
    return false;
  }
}

function getWordAudio(word) {
  const key = String(word || "").toLowerCase().trim();
  if (wordAudioCache.has(key)) return wordAudioCache.get(key);

  const audio = new Audio(
    `${WORD_AUDIO_BASE}${encodeURIComponent(key)}.mp3?v=${WORD_AUDIO_VERSION}`
  );
  audio.preload = "auto";
  wordAudioCache.set(key, audio);
  return audio;
}

function getCollabAudio(text) {
  const key = phraseAudioKey(text);
  if (collabAudioCache.has(key)) return collabAudioCache.get(key);

  const audio = new Audio(
    `${COLLAB_AUDIO_BASE}${encodeURIComponent(key)}.mp3?v=${COLLAB_AUDIO_VERSION}`
  );
  audio.preload = "auto";
  collabAudioCache.set(key, audio);
  return audio;
}

function preloadCurrentUnitAudio() {
  const unit = currentUnit();
  if (!unit) return;
  const collabPhrases = makeCollabPhrases(unit, unit.sightWords || []);
  const words = [
    ...(unit.words || []),
    ...(unit.sightWords || []),
    ...collabPhrases.flatMap(item => tokenizePhraseText(item.phrase))
  ];
  [...new Set(words.map(word => word.toLowerCase()))].forEach(word => {
    const audio = getWordAudio(word);
    if (audio.readyState === HTMLMediaElement.HAVE_NOTHING) {
      audio.load();
    }
  });
  collabPhrases.forEach(item => {
    const audio = getCollabAudio(item.phrase);
    if (audio.readyState === HTMLMediaElement.HAVE_NOTHING) {
      audio.load();
    }
  });
}

function stopRecordedAudio() {
  window.clearTimeout(recordedRepeatTimer);
  recordedRepeatTimer = 0;
  const resolveActiveWord = activeWordResolve;
  activeWordResolve = null;
  if (!activeWordAudio) {
    if (resolveActiveWord) resolveActiveWord();
    return;
  }
  activeWordAudio.onended = null;
  activeWordAudio.onerror = null;
  activeWordAudio.pause();
  activeWordAudio.currentTime = 0;
  activeWordAudio = null;
  if (resolveActiveWord) resolveActiveWord();
}

function speakUtterance(text, voice, rate) {
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = voice ? voice.lang : "en-US";
  utterance.rate = rate;
  utterance.pitch = 1;
  utterance.volume = 1;
  if (voice) utterance.voice = voice;
  window.speechSynthesis.speak(utterance);
  return utterance;
}

function getConsistentGoogleVoice() {
  const voice = chooseGoogleVoice();
  if (voice && isPreferredTtsVoice(voice)) return Promise.resolve(voice);

  return new Promise(resolve => {
    let settled = false;
    const finish = () => {
      if (settled) return;
      settled = true;
      resolve(chooseGoogleVoice());
    };
    window.speechSynthesis.onvoiceschanged = finish;
    window.setTimeout(finish, 500);
  });
}

function chooseGoogleVoice() {
  const voices = window.speechSynthesis.getVoices();
  const chosen =
    GOOGLE_TTS_VOICE_NAMES.map(name => voices.find(voice => voice.name === name)).find(Boolean) ||
    voices.find(voice => voice.name.toLowerCase().includes("google") && voice.lang.startsWith("en")) ||
    voices.find(voice => /natural|online/i.test(voice.name) && voice.lang === "en-US") ||
    voices.find(voice => /natural|online/i.test(voice.name) && voice.lang.startsWith("en")) ||
    voices.find(voice => voice.lang === "en-US") ||
    voices.find(voice => voice.lang.startsWith("en"));
  if (chosen && (!selectedTtsVoice || isPreferredTtsVoice(chosen) || !isPreferredTtsVoice(selectedTtsVoice))) {
    selectedTtsVoice = chosen;
  }
  return selectedTtsVoice;
}

function isPreferredTtsVoice(voice) {
  return Boolean(
    voice &&
    voice.lang.startsWith("en") &&
    (voice.name.toLowerCase().includes("google") || /natural|online/i.test(voice.name))
  );
}

if ("speechSynthesis" in window) {
  window.speechSynthesis.getVoices();
}

renderApp();
initializeStudentSession();
window.setInterval(() => {
  updateActiveStudyClock();
  saveLearningHeartbeat();
}, 15000);
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") {
    updateActiveStudyClock(Date.now(), true);
    saveLearningHeartbeat();
    lastActivityAt = 0;
    lastActivityTickAt = 0;
  } else {
    lastActivityTickAt = Date.now();
  }
});
