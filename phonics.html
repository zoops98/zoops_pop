<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23ff263d'/%3E%3Ctext x='32' y='43' text-anchor='middle' font-family='Arial' font-size='34' font-weight='900' fill='white'%3EZ%3C/text%3E%3C/svg%3E">
<title>Zoops PoP</title>
<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --sky: #17b7f1;
    --sun: #ffe800;
    --hot: #ff263d;
    --lime: #7bd62d;
    --orange: #ff9f1c;
    --violet: #6d4ee6;
    --paper: #fffdf4;
    --ink: #17151f;
    --muted: #625f6f;
    --line: #201d2b;
    --accent: #ff263d;
    --accent-soft: #fff0a8;
    --shadow: 0 10px 0 rgba(23, 21, 31, 0.16);
    --small-shadow: 0 5px 0 rgba(23, 21, 31, 0.12);
    --radius: 8px;
  }

  html {
    min-height: 100%;
  }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    font-family: "Arial Rounded MT Bold", "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    letter-spacing: 0;
    background-color: #ffd952;
    background-image:
      linear-gradient(90deg, rgba(255,255,255,0.44) 50%, transparent 50%),
      linear-gradient(rgba(255,255,255,0.44) 50%, transparent 50%),
      linear-gradient(180deg, #19baf3 0 280px, transparent 280px);
    background-size: 36px 36px, 36px 36px, 100% 100%;
  }

  button,
  input {
    font: inherit;
  }

  button {
    color: inherit;
  }

  .app {
    min-height: 100vh;
    padding: 18px;
  }

  .storybook {
    max-width: 1440px;
    margin: 0 auto;
    border: 4px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--paper);
    box-shadow: 0 14px 0 rgba(23, 21, 31, 0.24);
  }

  .cover-band {
    position: relative;
    overflow: hidden;
    min-height: 178px;
    padding: 22px 26px 18px;
    background:
      radial-gradient(circle at 12% 16%, rgba(255,255,255,0.8) 0 5px, transparent 6px),
      radial-gradient(circle at 88% 22%, rgba(255,255,255,0.8) 0 5px, transparent 6px),
      linear-gradient(135deg, #16bdf8 0%, #35cdf7 48%, #7bd62d 49%, #69c61e 100%);
    border-bottom: 4px solid var(--line);
  }

  .cover-band::before,
  .cover-band::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.8);
    opacity: 0.8;
  }

  .cover-band::before {
    width: 180px;
    height: 180px;
    left: -80px;
    bottom: -94px;
    background: #ff338f;
  }

  .cover-band::after {
    width: 132px;
    height: 132px;
    right: -46px;
    top: -44px;
    background: #ff7b1f;
  }

  .cover-content {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: end;
    gap: 22px;
  }

  .cover-tools {
    display: grid;
    justify-items: end;
    gap: 12px;
  }

  .player-hud {
    display: grid;
    grid-template-columns: auto minmax(120px, 190px) auto;
    align-items: center;
    gap: 10px;
    padding: 9px 11px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--small-shadow);
    font-size: 13px;
    font-weight: 900;
  }

  .player-hud[hidden] {
    display: none;
  }

  .level-chip,
  .streak-chip {
    white-space: nowrap;
  }

  .level-chip {
    color: var(--hot);
  }

  .xp-track {
    height: 13px;
    overflow: hidden;
    border: 2px solid var(--line);
    border-radius: 999px;
    background: #e9e9ee;
  }

  .xp-fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, var(--sun), var(--orange));
    transition: width .35s ease;
  }

  .student-signout {
    min-height: 42px;
    padding: 8px 14px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: var(--sun);
    box-shadow: var(--small-shadow);
    cursor: pointer;
    font-size: 14px;
    font-weight: 900;
  }

  .student-signout:hover {
    background: #fff;
  }

  .student-signout[hidden] {
    display: none;
  }

  .brand-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    width: fit-content;
    margin-bottom: 12px;
    padding: 8px 14px;
    border: 3px solid var(--line);
    border-radius: 999px;
    background: var(--sun);
    box-shadow: var(--small-shadow);
    font-size: 14px;
    font-weight: 900;
  }

  .brand-kicker span {
    display: inline-grid;
    place-items: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--hot);
    color: #fff;
  }

  .title-stack {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 10px 14px;
  }

  .title-stack h1 {
    margin: 0;
    color: #fff;
    font-size: clamp(34px, 7vw, 88px);
    line-height: 0.9;
    text-shadow:
      0 4px 0 var(--line),
      4px 0 0 var(--line),
      -4px 0 0 var(--line),
      0 -4px 0 var(--line);
  }

  .title-stack strong {
    display: inline-block;
    padding: 4px 12px 8px;
    border: 4px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    color: var(--hot);
    font-size: clamp(24px, 5vw, 58px);
    line-height: 0.9;
    box-shadow: var(--small-shadow);
  }

  .product-subtitle {
    display: inline-block;
    margin-top: 10px;
    padding: 7px 12px;
    border: 3px solid var(--line);
    border-radius: 999px;
    background: var(--sun);
    box-shadow: var(--small-shadow);
    font-size: 15px;
    font-weight: 900;
  }

  .sound-display {
    display: grid;
    grid-template-columns: repeat(2, 74px);
    gap: 8px;
    padding: 10px;
    border: 4px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--shadow);
    transform: rotate(2deg);
  }

  .sound-block {
    display: grid;
    place-items: center;
    min-height: 66px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    color: #fff;
    font-size: 35px;
    font-weight: 900;
    text-shadow: 0 3px 0 rgba(23,21,31,0.32);
  }

  .sound-block:nth-child(1) { background: #ff263d; }
  .sound-block:nth-child(2) { background: #16a7ef; }
  .sound-block:nth-child(3) { background: #75cf24; }
  .sound-block:nth-child(4) { background: #ff9f1c; }

  .book-tabs {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    background: #17151f;
    border-bottom: 4px solid var(--line);
  }

  .book-tab {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
    min-width: 0;
    min-height: 62px;
    padding: 9px 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: #fff;
    cursor: pointer;
    text-align: left;
  }

  .book-tab:hover,
  .book-tab.active {
    background: var(--accent);
  }

  .book-tab b {
    font-size: 15px;
    line-height: 1.1;
  }

  .book-tab span {
    color: rgba(255,255,255,0.8);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 11px;
    font-weight: 700;
    line-height: 1.15;
    overflow-wrap: anywhere;
  }

  .workbench {
    display: grid;
    grid-template-columns: 272px minmax(0, 1fr);
    min-height: calc(100vh - 292px);
  }

  .sidebar {
    padding: 18px;
    border-right: 4px solid var(--line);
    background:
      radial-gradient(circle, rgba(255,255,255,0.38) 0 2px, transparent 3px) 0 0 / 18px 18px,
      #f9f2c6;
  }

  .shelf-title {
    margin: 0 0 14px;
    padding: 11px 12px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--small-shadow);
    font-size: 14px;
  }

  .unit-list {
    display: grid;
    gap: 10px;
  }

  .unit-btn {
    display: grid;
    grid-template-columns: 38px minmax(0, 1fr);
    gap: 10px;
    align-items: center;
    width: 100%;
    padding: 10px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--small-shadow);
    cursor: pointer;
    text-align: left;
  }

  .unit-btn:hover,
  .unit-btn.active {
    transform: translateY(-2px);
    background: var(--accent-soft);
  }

  .unit-btn.active {
    outline: 4px solid var(--accent);
  }

  .unit-index {
    display: grid;
    place-items: center;
    width: 38px;
    height: 38px;
    border: 3px solid var(--line);
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-weight: 900;
  }

  .unit-btn b {
    display: block;
    font-size: 15px;
    line-height: 1.1;
  }

  .unit-btn span:last-child {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 12px;
    font-weight: 700;
  }

  .main {
    min-width: 0;
    padding: 22px;
    background:
      radial-gradient(circle at 12px 12px, rgba(23,21,31,0.08) 0 3px, transparent 4px) 0 0 / 32px 32px,
      #fff8d8;
  }

  .worksheet {
    position: relative;
    padding: 20px;
    border: 4px solid var(--orange);
    border-radius: var(--radius);
    background: var(--paper);
    box-shadow: var(--shadow);
  }

  .worksheet::before {
    content: "";
    position: absolute;
    inset: 8px;
    pointer-events: none;
    border: 2px dashed rgba(255, 38, 61, 0.48);
    border-radius: var(--radius);
  }

  .unit-hero {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 18px;
    align-items: center;
    margin-bottom: 20px;
  }

  .unit-label {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    width: fit-content;
    margin-bottom: 10px;
    padding: 9px 16px;
    border: 3px solid var(--line);
    border-radius: 999px;
    background: #19aaf2;
    color: #fff;
    box-shadow: var(--small-shadow);
    font-size: 15px;
    font-weight: 900;
  }

  .unit-label span {
    display: inline-grid;
    place-items: center;
    width: 27px;
    height: 27px;
    border-radius: 50%;
    background: #fff;
    color: var(--accent);
  }

  .unit-hero h2 {
    margin: 0;
    font-size: clamp(30px, 5vw, 62px);
    line-height: 0.95;
  }

  .unit-meta {
    margin-top: 8px;
    color: var(--muted);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 14px;
    font-weight: 800;
  }

  .focus-card {
    display: grid;
    place-items: center;
    min-width: 160px;
    min-height: 118px;
    padding: 14px 22px;
    border: 4px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--shadow);
  }

  .focus-card .focus {
    color: var(--accent);
    font-size: clamp(46px, 8vw, 78px);
    font-weight: 900;
    line-height: 0.9;
  }

  .focus-card .caption {
    margin-top: 8px;
    color: var(--muted);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 12px;
    font-weight: 800;
  }

  .mode-row {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
  }

  .mode-tab,
  .utility-btn {
    min-height: 42px;
    padding: 9px 15px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--small-shadow);
    cursor: pointer;
    font-weight: 900;
  }

  .mode-tab:hover,
  .utility-btn:hover {
    transform: translateY(-2px);
  }

  .mode-tab.active {
    background: var(--accent);
    color: #fff;
  }

  .utility-btn {
    margin-left: auto;
    background: var(--sun);
  }

  .pattern-strip {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }

  .pattern-chip {
    padding: 7px 12px;
    border: 3px solid var(--line);
    border-radius: 999px;
    background: #fff;
    color: var(--accent);
    box-shadow: 0 3px 0 rgba(23, 21, 31, 0.12);
    font-size: 15px;
    font-weight: 900;
  }

  .word-grid,
  .challenge-grid,
  .sight-grid,
  .collab-grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
  }

  .word-card,
  .challenge-card,
  .sight-card,
  .collab-card {
    min-height: 126px;
    border: 4px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--small-shadow);
  }

  .word-card {
    display: grid;
    grid-template-rows: 32px 1fr;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .word-card:hover,
  .word-card.playing {
    transform: translateY(-4px);
    box-shadow: 0 10px 0 rgba(23, 21, 31, 0.18);
  }

  .word-card.playing {
    outline: 5px solid var(--sun);
  }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 8px;
    background: var(--accent-soft);
    border-bottom: 3px solid var(--line);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 12px;
    font-weight: 900;
  }

  .sound-dot {
    display: inline-grid;
    place-items: center;
    width: 22px;
    height: 22px;
    border: 2px solid var(--line);
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 11px;
  }

  .word-body {
    display: grid;
    place-items: center;
    padding: 15px 10px 18px;
  }

  .word {
    display: block;
    max-width: 100%;
    text-align: center;
    overflow-wrap: anywhere;
    word-break: normal;
    white-space: normal;
    font-size: clamp(32px, 3vw, 48px);
    font-weight: 900;
    line-height: 1.02;
  }

  .word.is-medium {
    font-size: clamp(28px, 2.7vw, 42px);
  }

  .word.is-long {
    font-size: clamp(22px, 2.35vw, 34px);
    line-height: 1.08;
  }

  .mark {
    color: var(--accent);
  }

  .blank-char {
    color: rgba(23, 21, 31, 0.42);
  }

  .selected-panel {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 16px;
    align-items: center;
    margin-bottom: 16px;
    padding: 16px;
    border: 4px solid var(--line);
    border-radius: var(--radius);
    background: linear-gradient(90deg, #fff 0%, #fff9c7 100%);
    box-shadow: var(--small-shadow);
  }

  .selected-word {
    display: block;
    max-width: 100%;
    overflow-wrap: anywhere;
    word-break: normal;
    white-space: normal;
    font-size: clamp(44px, 7vw, 82px);
    font-weight: 900;
    line-height: 0.95;
  }

  .selected-word.is-medium {
    font-size: clamp(38px, 5.8vw, 68px);
  }

  .selected-word.is-long {
    font-size: clamp(30px, 4.4vw, 52px);
    line-height: 1.02;
  }

  .selected-meta {
    margin-top: 8px;
    color: var(--muted);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-weight: 800;
  }

  .sight-panel {
    background: linear-gradient(90deg, #fff 0%, #e8ffd2 100%);
  }

  .sight-helper {
    margin-top: 8px;
    color: var(--muted);
    font: 800 14px "Segoe UI", system-ui, sans-serif;
  }

  .sight-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .collab-panel {
    background: linear-gradient(90deg, #fff 0%, #dff7ff 100%);
  }

  .collab-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .sight-card,
  .collab-card {
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 8px;
    min-height: 150px;
    padding: 12px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .sight-card:hover,
  .sight-card.playing,
  .collab-card:hover,
  .collab-card.playing {
    transform: translateY(-4px);
    box-shadow: 0 10px 0 rgba(23, 21, 31, 0.18);
  }

  .sight-card.playing,
  .collab-card.playing {
    outline: 5px solid var(--lime);
  }

  .sight-tag,
  .collab-tag {
    justify-self: start;
    padding: 5px 9px;
    border: 2px solid var(--line);
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font: 900 12px "Segoe UI", system-ui, sans-serif;
  }

  .sight-card .word {
    align-self: center;
    font-size: clamp(34px, 4.2vw, 58px);
  }

  .collab-phrase {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-self: center;
    gap: 8px;
    color: var(--ink);
    font-size: clamp(28px, 3.2vw, 46px);
    font-weight: 900;
    line-height: 1.05;
    text-align: center;
  }

  .selected-word.collab-phrase {
    justify-content: flex-start;
    font-size: clamp(42px, 5.8vw, 72px);
  }

  .collab-sight {
    color: var(--accent);
  }

  .collab-phonics {
    color: #0f8fcc;
  }

  .sight-action,
  .collab-action {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    min-height: 36px;
    border: 3px solid var(--line);
    border-radius: 999px;
    background: var(--sun);
    font: 900 13px "Segoe UI", system-ui, sans-serif;
  }

  .article-maker {
    position: relative;
    z-index: 1;
    display: grid;
    gap: 16px;
  }

  .article-maker[hidden] {
    display: none;
  }

  .article-toolbar,
  .article-preview,
  .article-source-board {
    border: 4px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--small-shadow);
  }

  .article-toolbar {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 14px;
    align-items: center;
    padding: 16px;
    background: linear-gradient(90deg, #fff 0%, #f1ffdc 100%);
  }

  .article-toolbar h3,
  .article-preview h3 {
    margin: 0;
    font-size: 26px;
  }

  .article-toolbar p,
  .article-status,
  .article-note {
    margin: 6px 0 0;
    color: var(--muted);
    font: 800 14px "Segoe UI", system-ui, sans-serif;
  }

  .article-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
  }

  .article-btn {
    min-height: 42px;
    padding: 9px 14px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: var(--sun);
    box-shadow: var(--small-shadow);
    cursor: pointer;
    font-weight: 900;
  }

  .article-btn.secondary {
    background: #fff;
  }

  .article-btn:disabled {
    cursor: wait;
    opacity: .62;
    transform: none;
  }

  .article-source-board {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    padding: 14px;
  }

  .article-source-block {
    min-width: 0;
    padding: 12px;
    border: 3px solid var(--line);
    border-radius: 6px;
    background: #f7fbff;
  }

  .article-source-block b {
    display: block;
    margin-bottom: 9px;
  }

  .article-chip-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .article-chip {
    padding: 5px 8px;
    border: 2px solid var(--line);
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font: 900 12px "Segoe UI", system-ui, sans-serif;
  }

  .article-preview {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 230px;
    gap: 16px;
    padding: 18px;
    background: #fffdf4;
  }

  .article-page-text {
    font-family: "Segoe UI", system-ui, sans-serif;
  }

  .article-title-line {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
  }

  .article-unit-pill {
    padding: 5px 9px;
    border: 2px solid var(--line);
    border-radius: 999px;
    background: var(--accent);
    color: #fff;
    font: 900 12px "Segoe UI", system-ui, sans-serif;
  }

  .article-story {
    margin: 0;
    color: var(--ink);
    font-size: 19px;
    font-weight: 750;
    line-height: 1.62;
    white-space: pre-line;
  }

  .article-word-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 14px;
  }

  .article-art {
    display: grid;
    place-items: center;
    min-height: 210px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: #eef9ff;
    overflow: hidden;
  }

  .article-art img {
    display: block;
    width: 100%;
    height: 210px;
    object-fit: contain;
    background: #fff;
  }

  .article-art-placeholder {
    padding: 14px;
    color: var(--muted);
    font: 900 14px "Segoe UI", system-ui, sans-serif;
    text-align: center;
  }

  .play-big {
    display: grid;
    place-items: center;
    width: 78px;
    height: 78px;
    border: 4px solid var(--line);
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    box-shadow: var(--small-shadow);
    cursor: pointer;
    font-size: 34px;
    font-weight: 900;
  }

  .challenge-card {
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
  }

  .challenge-card.correct {
    outline: 5px solid #7bd62d;
  }

  .challenge-card.wrong {
    outline: 5px solid #ff263d;
  }

  .challenge-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-height: 42px;
    padding: 5px 8px 5px 10px;
    border-bottom: 3px solid var(--line);
    background: var(--accent-soft);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 12px;
    font-weight: 900;
  }

  .listen-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    min-width: 92px;
    min-height: 32px;
    padding: 4px 10px;
    border: 3px solid var(--line);
    border-radius: 999px;
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 0 rgba(23, 21, 31, 0.16);
    cursor: pointer;
    font-size: 13px;
    font-weight: 900;
  }

  .listen-btn:hover,
  .listen-btn:focus-visible {
    transform: translateY(-1px);
    background: #078fda;
  }

  .listen-icon {
    font-size: 14px;
    line-height: 1;
  }

  .challenge-form {
    display: grid;
    gap: 8px;
    align-content: center;
    padding: 12px 10px 10px;
  }

  .challenge-input {
    width: 100%;
    min-height: 46px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    text-align: center;
    font-size: 20px;
    font-weight: 900;
    outline: 0;
  }

  .challenge-input:focus {
    background: #fff6b8;
  }

  .challenge-input::placeholder {
    color: #77727e;
    font-size: 14px;
    font-weight: 700;
  }

  .answer-feedback {
    min-height: 18px;
    color: var(--muted);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 12px;
    font-weight: 900;
    text-align: center;
  }

  .challenge-card.correct .answer-feedback {
    color: #348500;
  }

  .challenge-card.wrong .answer-feedback {
    color: #d50a27;
  }

  .check-btn {
    min-height: 38px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: #19aaf2;
    color: #fff;
    box-shadow: 0 3px 0 rgba(23, 21, 31, 0.15);
    cursor: pointer;
    font-size: 14px;
    font-weight: 900;
  }

  .score-board {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 14px;
  }

  .score-pill {
    padding: 8px 12px;
    border: 3px solid var(--line);
    border-radius: 999px;
    background: #fff;
    box-shadow: var(--small-shadow);
    font-weight: 900;
  }

  .score-pill b {
    color: var(--accent);
  }

  .complete {
    display: none;
    position: relative;
    z-index: 1;
    margin-bottom: 14px;
    padding: 14px;
    border: 4px solid var(--line);
    border-radius: var(--radius);
    background: var(--lime);
    color: #fff;
    box-shadow: var(--small-shadow);
    font-size: 18px;
    font-weight: 900;
    text-align: center;
    text-shadow: 0 2px 0 rgba(23, 21, 31, 0.26);
  }

  .complete.show {
    display: block;
  }

  .reward-dashboard {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1.2fr) minmax(0, .8fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .mission-board,
  .badge-board {
    padding: 13px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--small-shadow);
  }

  .reward-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
    font-weight: 900;
  }

  .mission-list {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .mission-item {
    min-width: 0;
    padding: 9px;
    border: 2px solid var(--line);
    border-radius: 6px;
    background: #f7f8fb;
  }

  .mission-item.done {
    background: #e8ffd2;
  }

  .mission-item b,
  .mission-item span {
    display: block;
    overflow-wrap: anywhere;
  }

  .mission-item b {
    font-size: 12px;
  }

  .mission-item span {
    margin-top: 3px;
    color: var(--muted);
    font: 800 11px "Segoe UI", system-ui, sans-serif;
  }

  .mission-progress {
    height: 7px;
    margin-top: 7px;
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: #fff;
  }

  .mission-progress i {
    display: block;
    height: 100%;
    background: var(--lime);
  }

  .badge-preview {
    display: flex;
    gap: 7px;
    min-height: 58px;
    overflow-x: auto;
  }

  .monster-badge {
    flex: 0 0 58px;
    min-width: 58px;
    padding: 5px;
    border: 2px solid var(--line);
    border-radius: 7px;
    background: var(--badge-color, #7bd62d);
    box-shadow: 0 3px 0 rgba(23,21,31,.16);
    text-align: center;
  }

  .monster-face {
    position: relative;
    width: 38px;
    height: 34px;
    margin: 0 auto 3px;
    border: 2px solid var(--line);
    border-radius: 46% 46% 42% 42%;
    background: #fff;
  }

  .monster-face::before {
    content: "••";
    position: absolute;
    left: 0;
    right: 0;
    top: 5px;
    font-size: 16px;
    letter-spacing: 7px;
    text-align: center;
  }

  .monster-face::after {
    content: "⌣";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    font-size: 18px;
    text-align: center;
  }

  .monster-badge small {
    display: block;
    overflow: hidden;
    color: var(--line);
    font-size: 8px;
    font-weight: 900;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .badge-empty {
    display: grid;
    place-items: center;
    width: 100%;
    color: var(--muted);
    font: 800 12px "Segoe UI", system-ui, sans-serif;
    text-align: center;
  }

  .listen-game {
    position: relative;
    z-index: 1;
    padding: 20px;
    border: 4px solid var(--line);
    border-radius: var(--radius);
    background: #fff9c9;
    box-shadow: var(--small-shadow);
    text-align: center;
  }

  .listen-game h3 {
    margin: 0;
    font-size: 26px;
  }

  .listen-instruction {
    margin: 5px 0 15px;
    color: var(--muted);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-weight: 800;
  }

  .listen-play {
    display: inline-grid;
    place-items: center;
    width: 74px;
    height: 74px;
    margin-bottom: 16px;
    padding: 0;
    border: 4px solid var(--line);
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    box-shadow: var(--small-shadow);
    cursor: pointer;
    font-size: 30px;
  }

  .listen-slots {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    min-height: 58px;
    margin-bottom: 16px;
  }

  .listen-slot {
    display: grid;
    place-items: center;
    min-width: 48px;
    height: 54px;
    padding: 0 10px;
    border: 3px solid var(--line);
    border-radius: 6px;
    background: #fff;
    font-size: 25px;
    font-weight: 900;
  }

  .listen-slot.filled {
    background: var(--accent-soft);
    color: var(--accent);
  }

  .listen-slot.pop-hit {
    animation: listen-slot-pop .48s cubic-bezier(.18,.9,.32,1.35);
  }

  .listen-pop-layer {
    position: absolute;
    z-index: 4;
    inset: -85px 0 0;
    overflow: visible;
    pointer-events: none;
  }

  .pop-word {
    position: absolute;
    left: var(--pop-x);
    top: var(--pop-y);
    color: var(--accent);
    font-size: 27px;
    font-weight: 900;
    text-shadow:
      2px 2px 0 #fff,
      -2px -2px 0 #fff,
      3px 4px 0 rgba(23,21,31,.18);
    transform: translate(-50%, -50%) scale(.35) rotate(-8deg);
    animation: pop-word-burst .62s ease-out forwards;
  }

  .pop-word.is-complete {
    color: var(--orange);
    font-size: 39px;
    animation-duration: .82s;
  }

  .pop-spark {
    position: absolute;
    left: var(--pop-x);
    top: var(--pop-y);
    width: 9px;
    height: 9px;
    border: 2px solid var(--line);
    border-radius: 2px;
    background: var(--spark-color);
    transform: translate(-50%, -50%);
    animation: pop-spark-fly .68s ease-out forwards;
  }

  @keyframes listen-slot-pop {
    0% { transform: scale(.75) rotate(-5deg); }
    45% { transform: scale(1.25) rotate(4deg); }
    72% { transform: scale(.94) rotate(-2deg); }
    100% { transform: scale(1) rotate(0); }
  }

  @keyframes pop-word-burst {
    0% { opacity: 0; transform: translate(-50%, -40%) scale(.3) rotate(-10deg); }
    28% { opacity: 1; transform: translate(-50%, -70%) scale(1.22) rotate(4deg); }
    68% { opacity: 1; transform: translate(-50%, -105%) scale(1) rotate(0); }
    100% { opacity: 0; transform: translate(-50%, -150%) scale(.82) rotate(3deg); }
  }

  @keyframes pop-spark-fly {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(.4) rotate(0); }
    75% { opacity: 1; }
    100% {
      opacity: 0;
      transform:
        translate(calc(-50% + var(--spark-x)), calc(-50% + var(--spark-y)))
        scale(1)
        rotate(var(--spark-rotate));
    }
  }

  .letter-bank {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 9px;
  }

  .letter-block {
    min-width: 54px;
    min-height: 54px;
    padding: 8px 12px;
    border: 3px solid var(--line);
    border-radius: 6px;
    background: #fff;
    box-shadow: 0 4px 0 rgba(23,21,31,.14);
    cursor: pointer;
    font-size: 23px;
    font-weight: 900;
  }

  .letter-block.used {
    visibility: hidden;
  }

  .listen-feedback {
    min-height: 27px;
    margin: 13px 0 0;
    font-weight: 900;
  }

  .listen-feedback.wrong { color: #c9142e; }
  .listen-feedback.correct { color: #247d15; }

  .level-pop {
    position: fixed;
    z-index: 20;
    inset: 0;
    display: grid;
    place-items: center;
    pointer-events: none;
    opacity: 0;
    background: rgba(23,21,31,.18);
  }

  .level-pop.show {
    animation: level-pop-scene 1.25s ease both;
  }

  .level-pop-card {
    padding: 24px 34px;
    border: 5px solid var(--line);
    border-radius: var(--radius);
    background: var(--sun);
    box-shadow: 10px 10px 0 rgba(23,21,31,.22);
    font-size: 34px;
    font-weight: 900;
    text-align: center;
    transform: scale(.6) rotate(-4deg);
  }

  .level-pop.show .level-pop-card {
    animation: level-pop-card 1.25s ease both;
  }

  @keyframes level-pop-scene {
    0%, 100% { opacity: 0; }
    15%, 78% { opacity: 1; }
  }

  @keyframes level-pop-card {
    0% { transform: scale(.5) rotate(-8deg); }
    30% { transform: scale(1.1) rotate(3deg); }
    55%, 80% { transform: scale(1) rotate(0); }
    100% { transform: scale(.8); }
  }

  @media (prefers-reduced-motion: reduce) {
    .listen-slot.pop-hit,
    .pop-word,
    .pop-spark,
    .level-pop.show,
    .level-pop.show .level-pop-card {
      animation-duration: .01ms;
    }
  }

  .mobile-units {
    display: none;
    position: relative;
    z-index: 1;
    gap: 8px;
    margin-bottom: 14px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .mobile-unit {
    flex: 0 0 auto;
    min-height: 38px;
    padding: 7px 11px;
    border: 3px solid var(--line);
    border-radius: 999px;
    background: #fff;
    box-shadow: 0 3px 0 rgba(23, 21, 31, 0.12);
    cursor: pointer;
    font-weight: 900;
  }

  .mobile-unit.active {
    background: var(--accent);
    color: #fff;
  }

  .copyright-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    border-top: 4px solid var(--line);
    background: #17151f;
    color: #fff;
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 13px;
    font-weight: 800;
  }

  .copyright-bar b {
    color: var(--sun);
  }

  @media (max-width: 900px) {
    .app {
      padding: 10px;
    }

    .cover-content {
      grid-template-columns: 1fr;
    }

    .sound-display {
      display: none;
    }

    .cover-tools {
      width: 100%;
      justify-items: stretch;
    }

    .player-hud {
      grid-template-columns: auto 1fr auto;
    }

    .reward-dashboard {
      grid-template-columns: 1fr;
    }

    .book-tabs {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .workbench {
      grid-template-columns: 1fr;
    }

    .sidebar {
      display: none;
    }

    .main {
      padding: 12px;
    }

    .worksheet {
      padding: 14px;
    }

    .unit-hero,
    .selected-panel {
      grid-template-columns: 1fr;
    }

    .focus-card {
      min-width: 0;
      min-height: 92px;
    }

    .mobile-units {
      display: flex;
    }

    .word-grid,
    .challenge-grid,
    .sight-grid,
    .collab-grid {
      grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
      gap: 10px;
    }

    .word-card,
    .challenge-card,
    .sight-card,
    .collab-card {
      min-height: 112px;
    }
  }

  @media (max-width: 540px) {
    .cover-band {
      min-height: 150px;
      padding: 18px;
    }

    .book-tabs {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .player-hud {
      grid-template-columns: auto 1fr;
    }

    .streak-chip {
      grid-column: 1 / -1;
    }

    .mission-list {
      grid-template-columns: 1fr;
    }

    .article-toolbar,
    .article-preview,
    .article-source-board {
      grid-template-columns: 1fr;
    }

    .article-actions {
      justify-content: stretch;
    }

    .article-btn {
      flex: 1 1 auto;
    }

    .book-tab {
      min-height: 60px;
      padding: 7px 6px;
      text-align: center;
    }

    .book-tab b {
      font-size: 13px;
    }

    .book-tab span {
      font-size: 10px;
    }

    .word-grid,
    .challenge-grid,
    .sight-grid,
    .collab-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .word {
      font-size: 31px;
    }

    .mode-row {
      align-items: stretch;
    }

    .mode-tab,
    .utility-btn {
      flex: 1 1 auto;
    }

    .utility-btn {
      margin-left: 0;
    }
  }
</style>
</head>
<body>
<div class="app">
  <div class="storybook">
    <header class="cover-band">
      <div class="cover-content">
        <div>
          <div class="brand-kicker"><span>PoP</span> Zoops Books</div>
          <div class="title-stack">
            <h1>Zoops</h1>
            <strong>PoP</strong>
          </div>
          <div class="product-subtitle">Phonics Patterns</div>
        </div>
        <div class="cover-tools">
          <div id="playerHud" class="player-hud" hidden>
            <span id="levelChip" class="level-chip">Lv. 1</span>
            <span class="xp-track" aria-label="Level progress">
              <span id="xpFill" class="xp-fill"></span>
            </span>
            <span id="streakChip" class="streak-chip">Streak 0일</span>
          </div>
          <button id="studentSignOut" class="student-signout" type="button" hidden>
            로그아웃
          </button>
          <div class="sound-display" aria-hidden="true">
            <div class="sound-block">a</div>
            <div class="sound-block">ee</div>
            <div class="sound-block">sh</div>
            <div class="sound-block">ay</div>
          </div>
        </div>
      </div>
    </header>

    <nav class="book-tabs" id="bookTabs" aria-label="Section tabs"></nav>

    <div class="workbench">
      <aside class="sidebar">
        <h2 class="shelf-title">Unit Shelf</h2>
        <div class="unit-list" id="unitList"></div>
      </aside>
      <main class="main" id="main"></main>
    </div>
    <footer class="copyright-bar">
      <span><b>Zoops PoP</b> phonics practice app</span>
      <span>Copyright 2026 Zoops Books. All rights reserved.</span>
    </footer>
  </div>
</div>
<div id="levelPop" class="level-pop" aria-live="polite">
  <div id="levelPopCard" class="level-pop-card">Pop! Level Up!</div>
</div>

<script src="phonics_curriculum.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase_config.js"></script>
<script>
const authClient = window.supabase && window.ZOOPS_SUPABASE
  ? window.supabase.createClient(
      window.ZOOPS_SUPABASE.url,
      window.ZOOPS_SUPABASE.publishableKey
    )
  : null;
const studentSignOut = document.getElementById("studentSignOut");
const playerHud = document.getElementById("playerHud");
const levelChip = document.getElementById("levelChip");
const xpFill = document.getElementById("xpFill");
const streakChip = document.getElementById("streakChip");
const levelPop = document.getElementById("levelPop");
const levelPopCard = document.getElementById("levelPopCard");
let learnerProfile = null;
let academyStaffProfile = null;
let activeLearningSessionId = null;
let activeLearningSessionPromise = null;
let learningSessionCompleted = false;
let studySeenWords = new Set();
let spellingAttemptCounts = {};
let activeStudySeconds = 0;
let activeSessionTodayBase = 0;
let lastActivityAt = 0;
let lastActivityTickAt = 0;
const LEARNING_IDLE_LIMIT_MS = 60000;
let gameState = {
  xp: 0,
  level: 1,
  level_xp: 0,
  streak_days: 0,
  today_seconds: 0,
  today_listen_correct: 0,
  today_spelling_correct: 0,
  badges: []
};

async function initializeStudentSession() {
  if (enableLocalStaffPreview()) return;
  if (!authClient) return;

  const { data: { session } } = await authClient.auth.getSession();
  studentSignOut.hidden = !session;
  if (!session) return;

  const [studentResult, staffResult] = await Promise.all([
    authClient
      .from("students")
      .select("id, academy_id, english_name")
      .eq("auth_user_id", session.user.id)
      .eq("status", "active")
      .maybeSingle(),
    authClient
      .from("profiles")
      .select("academy_id, role, display_name")
      .eq("id", session.user.id)
      .maybeSingle()
  ]);

  learnerProfile = studentResult.data;
  academyStaffProfile = ["academy_owner", "teacher"].includes(staffResult.data?.role)
    ? staffResult.data
    : null;
  studentSignOut.textContent = academyStaffProfile ? "관리자 로그아웃" : "로그아웃";
  if (academyStaffProfile && shouldOpenArticleMaker()) {
    state.mode = "article";
  }
  if (learnerProfile) {
    playerHud.hidden = false;
    await loadGameState();
  }
  if (academyStaffProfile) renderMain();
}

function enableLocalStaffPreview() {
  const host = window.location.hostname;
  const isLocalHost = ["127.0.0.1", "localhost", ""].includes(host);
  const isPreview = new URLSearchParams(window.location.search).get("staffPreview") === "1";
  if (!isLocalHost || !isPreview) return false;

  academyStaffProfile = {
    academy_id: "local-preview",
    role: "academy_owner",
    display_name: "Local Preview"
  };
  if (shouldOpenArticleMaker()) {
    state.mode = "article";
  }
  studentSignOut.hidden = true;
  renderMain();
  return true;
}

function shouldOpenArticleMaker() {
  return new URLSearchParams(window.location.search).get("articleMaker") === "1";
}

studentSignOut.addEventListener("click", async () => {
  if (!authClient) {
    window.location.href = "portal.html";
    return;
  }

  studentSignOut.disabled = true;
  studentSignOut.textContent = "로그아웃 중...";
  await finishActiveLearningSession(false);

function playPopEffect(isComplete = false) {
  try {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) return;
    const context = new AudioContextClass();
    const oscillator = context.createOscillator();
    const popOscillator = context.createOscillator();
    const gain = context.createGain();
    const popGain = context.createGain();
    const noise = context.createBufferSource();
    const noiseGain = context.createGain();
    const noiseBuffer = context.createBuffer(
      1,
      Math.floor(context.sampleRate * .045),
      context.sampleRate
    );
    const noiseData = noiseBuffer.getChannelData(0);
    for (let index = 0; index < noiseData.length; index += 1) {
      noiseData[index] = (Math.random() * 2 - 1) * (1 - index / noiseData.length);
    }
    noise.buffer = noiseBuffer;

    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(isComplete ? 430 : 360, context.currentTime);
    oscillator.frequency.exponentialRampToValueAtTime(
      isComplete ? 980 : 720,
      context.currentTime + .13
    );
    gain.gain.setValueAtTime(isComplete ? .16 : .12, context.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, context.currentTime + .24);

    popOscillator.type = "triangle";
    popOscillator.frequency.setValueAtTime(150, context.currentTime);
    popOscillator.frequency.exponentialRampToValueAtTime(85, context.currentTime + .09);
    popGain.gain.setValueAtTime(.11, context.currentTime);
    popGain.gain.exponentialRampToValueAtTime(.001, context.currentTime + .11);

    noiseGain.gain.setValueAtTime(.055, context.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(.001, context.currentTime + .045);

    oscillator.connect(gain);
    popOscillator.connect(popGain);
    noise.connect(noiseGain);
    gain.connect(context.destination);
    popGain.connect(context.destination);
    noiseGain.connect(context.destination);
    oscillator.start();
    popOscillator.start();
    noise.start();
    oscillator.stop(context.currentTime + .23);
    popOscillator.stop(context.currentTime + .12);
    noise.stop(context.currentTime + .05);
    oscillator.onended = () => context.close();
  } catch {}
}

function playWrongEffect() {
  try {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) return;
    const context = new AudioContextClass();
    const oscillator = context.createOscillator();
    const gain = context.createGain();
    oscillator.type = "triangle";
    oscillator.frequency.setValueAtTime(210, context.currentTime);
    oscillator.frequency.linearRampToValueAtTime(150, context.currentTime + .12);
    gain.gain.setValueAtTime(.07, context.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, context.currentTime + .16);
    oscillator.connect(gain);
    gain.connect(context.destination);
    oscillator.start();
    oscillator.stop(context.currentTime + .17);
    oscillator.onended = () => context.close();
  } catch {}
}

async function beginLearningSession() {
  if (!authClient || !learnerProfile || learningSessionCompleted) return null;
  if (activeLearningSessionId) return activeLearningSessionId;
  if (activeLearningSessionPromise) return activeLearningSessionPromise;

  const unit = currentUnit();
  const context = {
    sectionKey: state.book,
    unitKey: currentUnitKey(),
    unitName: unit.name,
    mode: state.mode === "spell" ? "spelling" : "study",
    totalCount: unit.words.length,
  };

  activeLearningSessionPromise = authClient.rpc("start_learning_session", {
    p_section_key: context.sectionKey,
    p_unit_key: context.unitKey,
    p_unit_name: context.unitName,
    p_mode: context.mode,
    p_total_count: context.totalCount,
  }).then(({ data, error }) => {
    if (error) {
      console.warn("Learning session could not start:", error.message);
      return null;
    }
    activeLearningSessionId = data;
    activeSessionTodayBase = Number(gameState.today_seconds) || 0;
    return data;
  }).finally(() => {
    activeLearningSessionPromise = null;
  });

  return activeLearningSessionPromise;
}

async function finishActiveLearningSession(studyCompleted = false) {
  const sessionId = activeLearningSessionId || await activeLearningSessionPromise;
  if (!sessionId || !authClient) return;

  updateActiveStudyClock();
  const elapsedSeconds = Math.round(activeStudySeconds);
  await authClient.rpc("touch_learning_session", {
    p_session_id: sessionId,
    p_elapsed_seconds: elapsedSeconds,
  });
  await authClient.rpc("finish_learning_session", {
    p_session_id: sessionId,
    p_study_board_completed: studyCompleted,
  });
  if (activeLearningSessionId === sessionId) {
    activeLearningSessionId = null;
    activeLearningSessionPromise = null;
    resetActivityClock();
  }
}

function resetLearningSessionState() {
  activeLearningSessionId = null;
  activeLearningSessionPromise = null;
  learningSessionCompleted = false;
  studySeenWords = new Set();
  spellingAttemptCounts = {};
  resetActivityClock();
}

function resetActivityClock() {
  activeStudySeconds = 0;
  activeSessionTodayBase = Number(gameState.today_seconds) || 0;
  lastActivityAt = 0;
  lastActivityTickAt = 0;
}

function noteLearningActivity() {
  if (!learnerProfile || learningSessionCompleted || document.hidden) return;
  const now = Date.now();
  updateActiveStudyClock(now);
  lastActivityAt = now;
  lastActivityTickAt = now;
  beginLearningSession();
}

function updateActiveStudyClock(now = Date.now(), countUntilNow = false) {
  if (!lastActivityAt || !lastActivityTickAt || (document.hidden && !countUntilNow)) {
    lastActivityTickAt = now;
    return;
  }
  const activeUntil = Math.min(now, lastActivityAt + LEARNING_IDLE_LIMIT_MS);
  if (activeUntil > lastActivityTickAt) {
    activeStudySeconds += (activeUntil - lastActivityTickAt) / 1000;
  }
  lastActivityTickAt = now;
}

async function saveLearningHeartbeat() {
  if (!authClient || !activeLearningSessionId) return;
  updateActiveStudyClock();
  await authClient.rpc("touch_learning_session", {
    p_session_id: activeLearningSessionId,
    p_elapsed_seconds: Math.round(activeStudySeconds),
  });
  gameState.today_seconds = activeSessionTodayBase + Math.round(activeStudySeconds);
  updatePlayerHud();
}

async function trackSpellingAttempt(word, isCorrect) {
  if (!learnerProfile || state.mode !== "spell" || learningSessionCompleted) return;
  const attemptNumber = (spellingAttemptCounts[word] || 0) + 1;
  spellingAttemptCounts[word] = attemptNumber;
  const unitFinished = currentUnit().words.every(
    (_, index) => state.checked[index] === true
  );
  const sessionId = await beginLearningSession();
  if (!sessionId) return;

  await authClient.rpc("record_word_attempt", {
    p_session_id: sessionId,
    p_word: word,
    p_is_correct: isCorrect,
    p_attempt_number: attemptNumber,
  });

  if (isCorrect) {
    const { data } = await authClient.rpc("award_spelling_success", {
      p_section_key: state.book,
      p_unit_key: currentUnitKey(),
      p_word: word,
    });
    applyRewardResult(data);
    await loadGameState(false);
  }

  if (unitFinished) {
    learningSessionCompleted = true;
    await finishActiveLearningSession(false);
  }
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttribute(value) {
  return escapeHtml(value).replaceAll("`", "&#096;");
}

function getMarkedLetters(word, unit) {
  const lower = word.toLowerCase();
  const marked = Array(word.length).fill(false);

  if (unit.split) {
    const firstIndex = lower.indexOf(unit.split[0]);
    const lastIndex = lower.lastIndexOf(unit.split[1]);
    if (firstIndex >= 0) marked[firstIndex] = true;
    if (lastIndex > firstIndex) marked[lastIndex] = true;
  }

  const patterns = [...(unit.patterns || [])].sort((a, b) => b.length - a.length);
  for (const pattern of patterns) {
    let start = 0;
    while (pattern && start < lower.length) {
      const index = lower.indexOf(pattern.toLowerCase(), start);
      if (index === -1) break;
      for (let i = index; i < index + pattern.length; i += 1) marked[i] = true;
      start = index + Math.max(pattern.length, 1);
    }
  }

  return marked;
}

function markWord(word, unit) {
  const marked = getMarkedLetters(word, unit);
  return word.split("").map((letter, index) => (
    marked[index] ? `<span class="mark">${escapeHtml(letter)}</span>` : escapeHtml(letter)
  )).join("");
}

function getWordLengthClass(word) {
  if (word.length >= 10) return "is-long";
  if (word.length >= 8) return "is-medium";
  return "";
}

function makeExplicitCollabPhrase([phrase, sightWord, phonicsWords]) {
  const targets = phonicsWords.filter(Boolean);
  return {
    phrase,
    sightWord,
    phonicsWord: targets[0] || "",
    phonicsWords: targets,
    nextWord: targets[1] || ""
  };
}

function makeCollabPhrases(unit, sightWords) {
  const unitOverride = UNIT_COLLAB_PHRASE_OVERRIDES[`${unit.name}::${unit.label}`] || UNIT_COLLAB_PHRASE_OVERRIDES[unit.name];
  if (unitOverride) {
    return unitOverride.slice(0, 9).map(makeExplicitCollabPhrase);
  }

  const usedPhonicsWords = new Set();
  const usedPhrases = new Set();
  return sightWords.slice(0, 9).map((sightWord, index) => {
    const item = makeCollabPhrase(unit, sightWord, index, usedPhonicsWords, usedPhrases);
    (item.phonicsWords || [item.phonicsWord]).forEach(word => {
      if (word) usedPhonicsWords.add(String(word).toLowerCase());
    });
    usedPhrases.add(item.phrase.toLowerCase());
    return item;
  });
}

function articleFor(word) {
  return /^[aeiou]/i.test(String(word || "")) ? "an" : "a";
}

function displaySightWord(word) {
  return String(word || "").toLowerCase() === "i" ? "I" : word;
}

function pluralizeForCollocation(word) {
  const text = String(word || "");
  if (!text) return "";
  if (/[^aeiou]y$/i.test(text)) return `${text.slice(0, -1)}ies`;
  if (/(s|x|z|ch|sh)$/i.test(text)) return `${text}es`;
  return `${text}s`;
}

function makeDefaultCollocationPhrase(word, index) {
  const cleanWord = String(word || "");
  const options = [
    { phrase: `${articleFor(cleanWord)} ${cleanWord}`, sightWord: articleFor(cleanWord) },
    { phrase: `the ${cleanWord}`, sightWord: "the" },
    { phrase: `my ${cleanWord}`, sightWord: "my" },
    { phrase: `little ${cleanWord}`, sightWord: "little" },
    { phrase: `big ${cleanWord}`, sightWord: "big" },
    { phrase: `two ${pluralizeForCollocation(cleanWord)}`, sightWord: "two" },
    { phrase: `this ${cleanWord}`, sightWord: "this" },
    { phrase: `that ${cleanWord}`, sightWord: "that" },
    { phrase: `one ${cleanWord}`, sightWord: "one" }
  ];
  return options[index % options.length];
}

function chooseCollabPhonicsWord(phonicsWords, startIndex, sightWord, usedPhonicsWords, preferredWords = []) {
  const sight = String(sightWord || "").toLowerCase();
  const allowsNonNoun = new Set(["and", "or"]).has(sight);
  const preferred = preferredWords
    .map(word => phonicsWords.find(item => String(item || "").toLowerCase() === String(word || "").toLowerCase()))
    .filter(Boolean);
  const ordered = [
    ...preferred,
    ...phonicsWords.slice(startIndex),
    ...phonicsWords.slice(0, startIndex)
  ];

  for (const candidate of ordered) {
    const lower = String(candidate || "").toLowerCase();
    if (!candidate || lower === sight || usedPhonicsWords.has(lower)) continue;
    if (!allowsNonNoun && NON_NOUN_COLLAB_WORDS.has(lower)) continue;
    return candidate;
  }

  for (const candidate of ordered) {
    const lower = String(candidate || "").toLowerCase();
    if (!candidate || lower === sight) continue;
    if (!allowsNonNoun && NON_NOUN_COLLAB_WORDS.has(lower)) continue;
    return candidate;
  }

  return ordered.find(Boolean) || "";
}

function chooseCollabPair(phonicsWords, startIndex, sightWord, usedPhonicsWords) {
  const first = chooseCollabPhonicsWord(phonicsWords, startIndex, sightWord, usedPhonicsWords);
  const temporaryUsed = new Set(usedPhonicsWords);
  if (first) temporaryUsed.add(String(first).toLowerCase());
  const second = chooseCollabPhonicsWord(phonicsWords, startIndex + 1, sightWord, temporaryUsed);
  return [first, second || first];
}

function makeOverrideCollabPhrase(unit, sightWord) {
  const override = COLLAB_PHRASE_OVERRIDES[`${unit.name}::${String(sightWord || "").toLowerCase()}`];
  if (!override) return null;
  const [phrase, phonicsWords] = override;
  const targets = phonicsWords.filter(Boolean);
  return {
    phrase,
    sightWord: displaySightWord(sightWord),
    phonicsWord: targets[0] || "",
    phonicsWords: targets,
    nextWord: targets[1] || ""
  };
}

function makeCollabPhrase(unit, sightWord, index, usedPhonicsWords, usedPhrases) {
  const override = makeOverrideCollabPhrase(unit, sightWord);
  if (override) return override;

  const phonicsWords = unit.words || [];
  const preferred = preferredCollabWords(unit.name, sightWord);
  const word = chooseCollabPhonicsWord(phonicsWords, index, sightWord, usedPhonicsWords, preferred);
  const fallback = makeDefaultCollocationPhrase(word, index);
  return {
    phrase: fallback.phrase,
    sightWord: fallback.sightWord,
    phonicsWord: word,
    phonicsWords: [word].filter(Boolean),
    nextWord: ""
  };
}

function markCollabPhrase(item) {
  const sight = String(item.sightWord || "").toLowerCase();
  const phonicsWords = new Set([
    item.phonicsWord,
    item.nextWord,
    ...(item.phonicsWords || [])
  ].filter(Boolean).map(word => String(word).toLowerCase()));
  return tokenizePhraseText(item.phrase).map(token => {
    const lower = token.toLowerCase();
    const normalized = lower.replace(/'s$/, "");
    const singular = normalized.endsWith("s") ? normalized.slice(0, -1) : normalized;
    const type = normalized === sight || singular === sight
      ? "collab-sight"
      : phonicsWords.has(normalized) || phonicsWords.has(singular)
        ? "collab-phonics"
        : "";
    return `<span class="${type}">${escapeHtml(token)}</span>`;
  }).join(" ");
}

function tokenizePhraseText(text) {
  return String(text || "").match(/[A-Za-z']+/g) || [];
}

function phraseAudioKey(text) {
  return tokenizePhraseText(text)
    .map(token => token.toLowerCase())
    .join("_");
}

function renderMain() {
  const main = document.getElementById("main");
  const unit = currentUnit();
  const canMakeArticle = isAcademyStaff();
  if (state.mode === "article" && !canMakeArticle) {
    state.mode = "study";
  }
  if (state.mode === "listen" && state.listenTokens.length === 0) {
    prepareListenRound(state.listenIndex);
  }
  const selectedWord = unit.words[state.selectedIndex] || unit.words[0];
  const sightWords = unit.sightWords || [];
  const selectedSightWord = sightWords[state.sightIndex] || sightWords[0] || selectedWord;
  const collabPhrases = makeCollabPhrases(unit, sightWords);
  const selectedCollabPhrase = collabPhrases[state.collabIndex] || collabPhrases[0];
  const firstUncheckedIndex = unit.words.findIndex((_, index) => state.checked[index] !== true);
  const spellingPromptWord = unit.words[firstUncheckedIndex === -1 ? 0 : firstUncheckedIndex];
  const listenPromptWord = unit.words[state.listenIndex] || unit.words[0];
  const checkedValues = Object.values(state.checked);
  const correctCount = checkedValues.filter(Boolean).length;
  const checkedCount = Object.keys(state.checked).length;
  const utilityWord = state.mode === "spell" ? spellingPromptWord :
    state.mode === "listen" ? listenPromptWord :
    state.mode === "sight" ? selectedSightWord :
    selectedWord;
  const utilityAction = state.mode === "article"
    ? "generateArticleSheet()"
    : state.mode === "collab" && selectedCollabPhrase
    ? `playCollabPhrase(${state.collabIndex})`
    : `playWord('${escapeHtml(utilityWord)}')`;
  const utilityLabel = state.mode === "article"
    ? "Make Article"
    : state.mode === "collab"
      ? "Play Collocation"
      : "Play Word";

  main.innerHTML = `
    <section class="worksheet">
      ${renderMobileUnits()}
      ${renderRewardDashboard()}
      <div class="unit-hero">
        <div>
          <div class="unit-label"><span>${state.unitIndex + 1}</span> ${escapeHtml(unit.label)}</div>
          <h2>${escapeHtml(unit.name)}</h2>
          <div class="unit-meta">${state.book} · ${unit.words.length} phonics words · ${sightWords.length} sight words</div>
        </div>
        <div class="focus-card">
          <div class="focus">${escapeHtml(unit.focus)}</div>
          <div class="caption">sound tile</div>
        </div>
      </div>

      <div class="mode-row">
        <button class="mode-tab ${state.mode === "study" ? "active" : ""}" onclick="setMode('study')">Study Board</button>
        <button class="mode-tab ${state.mode === "sight" ? "active" : ""}" onclick="setMode('sight')">Sight Words</button>
        <button class="mode-tab ${state.mode === "collab" ? "active" : ""}" onclick="setMode('collab')">Collocation</button>
        <button class="mode-tab ${state.mode === "spell" ? "active" : ""}" onclick="setMode('spell')">Spelling Check</button>
        <button class="mode-tab ${state.mode === "listen" ? "active" : ""}" onclick="setMode('listen')">Listen & Select</button>
        ${canMakeArticle ? `<button class="mode-tab ${state.mode === "article" ? "active" : ""}" onclick="setMode('article')">Article Maker</button>` : ""}
        <button class="utility-btn" onclick="${utilityAction}">${utilityLabel}</button>
      </div>

      <div class="pattern-strip">
        ${unit.families.map(item => `<span class="pattern-chip">${escapeHtml(item)}</span>`).join("")}
        ${state.mode === "sight" ? `<span class="pattern-chip">Sight Words</span>` : ""}
        ${state.mode === "collab" ? `<span class="pattern-chip">Collocation</span>` : ""}
        ${state.mode === "article" ? `<span class="pattern-chip">Article Maker</span>` : ""}
      </div>

      ${
        state.mode === "study"
          ? renderStudyMode(unit, selectedWord)
          : state.mode === "sight"
            ? renderSightMode(unit, sightWords, selectedSightWord)
            : state.mode === "collab"
              ? renderCollabMode(collabPhrases, selectedCollabPhrase)
              : state.mode === "article"
                ? renderArticleMaker(unit, sightWords, collabPhrases)
                : state.mode === "spell"
                  ? renderSpellMode(unit, correctCount, checkedCount)
                  : renderListenMode(unit)
      }
    </section>
  `;
}

async function generateArticleSheet() {
  if (!isAcademyStaff()) {
    state.articleStatus = "Article Maker는 원장님 또는 교사 계정에서만 사용할 수 있습니다.";
    renderMain();
    return;
  }

  const apiKey = localStorage.getItem(GEMINI_KEY_STORAGE);
  if (!apiKey) {
    state.articleStatus = "academy.html에서 Google Gemini API 키를 먼저 저장해 주세요.";
    renderMain();
    return;
  }

  const unit = currentUnit();
  const sightWords = unit.sightWords || [];
  const collabPhrases = makeCollabPhrases(unit, sightWords);
  const source = buildArticleSource(unit, sightWords, collabPhrases);

  state.articleWorking = true;
  state.articleStatus = "짧은 글을 만들고 있습니다...";
  renderMain();

  try {
    const article = await generateArticleText(apiKey, source);
    state.articleDraft = {
      ...article,
      section: source.section,
      unit: source.unit,
      label: source.label,
      source,
      imageDataUri: "",
      note: ""
    };
    state.articleStatus = "글이 완성되었습니다. 수채화 그림을 만들고 있습니다...";
    renderMain();

    try {
      state.articleDraft.imageDataUri = await generateArticleImage(apiKey, state.articleDraft);
      state.articleStatus = "A4 Article이 완성되었습니다.";
    } catch (imageError) {
      state.articleDraft.note = `그림 생성은 실패했습니다: ${imageError.message}`;
      state.articleStatus = "글은 완성되었습니다. 그림은 다시 생성해 주세요.";
    }
  } catch (error) {
    state.articleStatus = error.message;
  } finally {
    state.articleWorking = false;
    renderMain();
  }
}

async function generateArticleText(apiKey, source) {
  const prompt = buildArticlePrompt(source);
  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${ARTICLE_TEXT_MODEL}:generateContent`,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-goog-api-key": apiKey,
      },
      body: JSON.stringify({
        contents: [{ role: "user", parts: [{ text: prompt }] }],
        generationConfig: {
          temperature: 0.55,
          maxOutputTokens: 1400,
          thinkingConfig: { thinkingBudget: 0 },
          responseMimeType: "application/json",
          responseSchema: {
            type: "OBJECT",
            properties: {
              title: { type: "STRING" },
              article: { type: "STRING" },
              picturePrompt: { type: "STRING" },
              wordBank: {
                type: "ARRAY",
                items: { type: "STRING" }
              }
            },
            required: ["title", "article", "picturePrompt", "wordBank"]
          }
        }
      }),
    }
  );
  const result = await response.json();
  if (!response.ok) {
    throw new Error(result.error?.message || "Gemini 글 생성 요청이 실패했습니다.");
  }
  const text = extractGeminiText(result);
  if (!text) throw new Error("Gemini가 글 데이터를 반환하지 않았습니다.");

  let draft;
  try {
    draft = JSON.parse(text);
  } catch {
    throw new Error("Gemini 글 응답 형식이 올바르지 않습니다. 다시 생성해 주세요.");
  }

  return {
    title: String(draft.title || `${source.unit} Reading`).trim(),
    article: String(draft.article || "").trim(),
    picturePrompt: String(draft.picturePrompt || "").trim(),
    wordBank: Array.isArray(draft.wordBank)
      ? draft.wordBank.map(word => String(word).trim()).filter(Boolean).slice(0, 18)
      : []
  };
}

function buildArticlePrompt(source) {
  return `You are creating a one-page A4 reading article for young Korean EFL phonics learners.
Return only valid JSON with title, article, picturePrompt, and wordBank.

Current unit:
- Section: ${source.section}
- Unit: ${source.unit}
- Sound focus: ${source.focus}

Learning materials the student already studied:
- Study Board phonics words: ${source.studyWords.join(", ")}
- Sight words: ${source.sightWords.join(", ")}
- Collocations: ${source.collocations.join(" | ")}
- Spelling Check words: ${source.spellingWords.join(", ")}
- Listen & Select words: ${source.listenWords.join(", ")}

Write a short English article, not a list.
Requirements:
- 5 to 7 short sentences.
- Use natural, meaningful language for children.
- Build one coherent mini-story or one clear real-life scene, not separate unrelated sentences.
- The article should be easy to illustrate as one picture.
- Do not mention many unrelated places or objects just to use more words.
- Use at least 8 phonics words from the Study Board.
- Use at least 5 sight words.
- Use at least 3 collocations naturally if they fit.
- Do not force awkward phrases.
- Keep the article easy enough for early elementary learners.
- The article must fit on one A4 page with one small illustration.
- The title should be short and child-friendly.
- wordBank should list 10 to 16 important words or phrases used in the article.
- picturePrompt should describe one cohesive watercolor-style scene that directly matches the article.
- picturePrompt must request a horizontal 16:9 scene composition for the worksheet image.
- The illustration should show the main setting, main characters, and 3 to 6 important objects from the article.
- Avoid collage, stickers, icons, tiny characters, split scenes, speech bubbles, labels, letters, or text in the image.
- The main subject should fit naturally inside the wide scene frame while keeping a gentle watercolor worksheet style.
- Keep every important character and object fully visible inside the 16:9 frame. Do not crop faces, bodies, hands, animals, food, or key objects.`;
}

async function generateArticleImage(apiKey, draft) {
  const prompt = [
    `${draft.picturePrompt}`,
    "Create one cohesive watercolor illustration for a children's phonics reading worksheet.",
    "Use a horizontal landscape 16:9 composition. The final image should feel intentionally wide, not a cropped portrait image.",
    "The picture must match the article as one natural scene, not a collage or a sticker sheet.",
    "Show the main characters and setting clearly. Include only objects that make sense in the article.",
    "Keep the entire scene inside the wide frame with safe margins. Do not cut off faces, bodies, animals, food, or key objects.",
    "The subject should fill the 16:9 scene frame with a balanced composition, but nothing important should be cropped.",
    "Soft colors, clean white background, friendly early elementary workbook style.",
    "No letters, no text, no watermark.",
    "The image should support this article:",
    draft.article
  ].join("\n");

  const primaryError = await tryGenerateArticleImage(apiKey, ARTICLE_IMAGE_MODEL, prompt)
    .then(result => {
      if (result) return { ok: true, result };
      return { ok: false, error: new Error("이미지 데이터가 비어 있습니다.") };
    })
    .catch(error => ({ ok: false, error }));
  if (primaryError.ok) return primaryError.result;

  const fallback = await tryGenerateArticleImage(apiKey, ARTICLE_IMAGE_FALLBACK_MODEL, prompt)
    .catch(error => {
      throw new Error(`${primaryError.error.message}; fallback: ${error.message}`);
    });
  if (!fallback) throw new Error(primaryError.error.message);
  return fallback;
}

async function tryGenerateArticleImage(apiKey, model, prompt) {
  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-goog-api-key": apiKey,
      },
      body: JSON.stringify({
        contents: [{ role: "user", parts: [{ text: prompt }] }],
        generationConfig: {
          responseModalities: ["IMAGE", "TEXT"]
        }
      }),
    }
  );
  const result = await response.json();
  if (!response.ok) {
    throw new Error(result.error?.message || `${model} 이미지 생성 요청이 실패했습니다.`);
  }
  const image = extractGeminiImage(result);
  return image ? `data:${image.mimeType};base64,${image.data}` : "";
}

function extractGeminiText(result) {
  return (result.candidates?.[0]?.content?.parts || [])
    .filter(part => !part.thought)
    .map(part => part.text || "")
    .join("")
    .trim();
}

function extractGeminiImage(result) {
  const parts = result.candidates?.[0]?.content?.parts || [];
  for (const part of parts) {
    const inlineData = part.inlineData || part.inline_data;
    if (inlineData?.data) {
      return {
        data: inlineData.data,
        mimeType: inlineData.mimeType || inlineData.mime_type || "image/png"
      };
    }
  }
  return null;
}

function exportArticleHtml() {
  if (!state.articleDraft) {
    state.articleStatus = "먼저 Article을 만들어 주세요.";
    renderMain();
    return;
  }
  const html = buildArticleHtmlDocument(state.articleDraft);
  const fileName = `${slugifyFileName(state.articleDraft.section)}-${slugifyFileName(state.articleDraft.unit)}-article.html`;
  const blob = new Blob([html], { type: "text/html;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = fileName;
  document.body.appendChild(link);
  link.click();
  link.remove();
  window.open(url, "_blank", "noopener,noreferrer");
  window.setTimeout(() => URL.revokeObjectURL(url), 60000);
}
