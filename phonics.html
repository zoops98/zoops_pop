<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23ff263d'/%3E%3Ctext x='32' y='43' text-anchor='middle' font-family='Arial' font-size='34' font-weight='900' fill='white'%3EZ%3C/text%3E%3C/svg%3E">
<title>Zoops PoP</title>
<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --sky: #17b7f1;
    --sun: #ffe800;
    --hot: #ff263d;
    --lime: #7bd62d;
    --orange: #ff9f1c;
    --violet: #6d4ee6;
    --paper: #fffdf4;
    --ink: #17151f;
    --muted: #625f6f;
    --line: #201d2b;
    --accent: #ff263d;
    --accent-soft: #fff0a8;
    --shadow: 0 10px 0 rgba(23, 21, 31, 0.16);
    --small-shadow: 0 5px 0 rgba(23, 21, 31, 0.12);
    --radius: 8px;
  }

  html {
    min-height: 100%;
  }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    font-family: "Arial Rounded MT Bold", "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    letter-spacing: 0;
    background-color: #ffd952;
    background-image:
      linear-gradient(90deg, rgba(255,255,255,0.44) 50%, transparent 50%),
      linear-gradient(rgba(255,255,255,0.44) 50%, transparent 50%),
      linear-gradient(180deg, #19baf3 0 280px, transparent 280px);
    background-size: 36px 36px, 36px 36px, 100% 100%;
  }

  button,
  input {
    font: inherit;
  }

  button {
    color: inherit;
  }

  .app {
    min-height: 100vh;
    padding: 18px;
  }

  .storybook {
    max-width: 1440px;
    margin: 0 auto;
    border: 4px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--paper);
    box-shadow: 0 14px 0 rgba(23, 21, 31, 0.24);
  }

  .cover-band {
    position: relative;
    overflow: hidden;
    min-height: 178px;
    padding: 22px 26px 18px;
    background:
      radial-gradient(circle at 12% 16%, rgba(255,255,255,0.8) 0 5px, transparent 6px),
      radial-gradient(circle at 88% 22%, rgba(255,255,255,0.8) 0 5px, transparent 6px),
      linear-gradient(135deg, #16bdf8 0%, #35cdf7 48%, #7bd62d 49%, #69c61e 100%);
    border-bottom: 4px solid var(--line);
  }

  .cover-band::before,
  .cover-band::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.8);
    opacity: 0.8;
  }

  .cover-band::before {
    width: 180px;
    height: 180px;
    left: -80px;
    bottom: -94px;
    background: #ff338f;
  }

  .cover-band::after {
    width: 132px;
    height: 132px;
    right: -46px;
    top: -44px;
    background: #ff7b1f;
  }

  .cover-content {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: end;
    gap: 22px;
  }

  .cover-tools {
    display: grid;
    justify-items: end;
    gap: 12px;
  }

  .player-hud {
    display: grid;
    grid-template-columns: auto minmax(120px, 190px) auto;
    align-items: center;
    gap: 10px;
    padding: 9px 11px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--small-shadow);
    font-size: 13px;
    font-weight: 900;
  }

  .player-hud[hidden] {
    display: none;
  }

  .level-chip,
  .streak-chip {
    white-space: nowrap;
  }

  .level-chip {
    color: var(--hot);
  }

  .xp-track {
    height: 13px;
    overflow: hidden;
    border: 2px solid var(--line);
    border-radius: 999px;
    background: #e9e9ee;
  }

  .xp-fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, var(--sun), var(--orange));
    transition: width .35s ease;
  }

  .student-signout {
    min-height: 42px;
    padding: 8px 14px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: var(--sun);
    box-shadow: var(--small-shadow);
    cursor: pointer;
    font-size: 14px;
    font-weight: 900;
  }

  .student-signout:hover {
    background: #fff;
  }

  .student-signout[hidden] {
    display: none;
  }

  .brand-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    width: fit-content;
    margin-bottom: 12px;
    padding: 8px 14px;
    border: 3px solid var(--line);
    border-radius: 999px;
    background: var(--sun);
    box-shadow: var(--small-shadow);
    font-size: 14px;
    font-weight: 900;
  }

  .brand-kicker span {
    display: inline-grid;
    place-items: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--hot);
    color: #fff;
  }

  .title-stack {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 10px 14px;
  }

  .title-stack h1 {
    margin: 0;
    color: #fff;
    font-size: clamp(34px, 7vw, 88px);
    line-height: 0.9;
    text-shadow:
      0 4px 0 var(--line),
      4px 0 0 var(--line),
      -4px 0 0 var(--line),
      0 -4px 0 var(--line);
  }

  .title-stack strong {
    display: inline-block;
    padding: 4px 12px 8px;
    border: 4px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    color: var(--hot);
    font-size: clamp(24px, 5vw, 58px);
    line-height: 0.9;
    box-shadow: var(--small-shadow);
  }

  .product-subtitle {
    display: inline-block;
    margin-top: 10px;
    padding: 7px 12px;
    border: 3px solid var(--line);
    border-radius: 999px;
    background: var(--sun);
    box-shadow: var(--small-shadow);
    font-size: 15px;
    font-weight: 900;
  }

  .sound-display {
    display: grid;
    grid-template-columns: repeat(2, 74px);
    gap: 8px;
    padding: 10px;
    border: 4px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--shadow);
    transform: rotate(2deg);
  }

  .sound-block {
    display: grid;
    place-items: center;
    min-height: 66px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    color: #fff;
    font-size: 35px;
    font-weight: 900;
    text-shadow: 0 3px 0 rgba(23,21,31,0.32);
  }

  .sound-block:nth-child(1) { background: #ff263d; }
  .sound-block:nth-child(2) { background: #16a7ef; }
  .sound-block:nth-child(3) { background: #75cf24; }
  .sound-block:nth-child(4) { background: #ff9f1c; }

  .book-tabs {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    background: #17151f;
    border-bottom: 4px solid var(--line);
  }

  .book-tab {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
    min-width: 0;
    min-height: 62px;
    padding: 9px 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: #fff;
    cursor: pointer;
    text-align: left;
  }

  .book-tab:hover,
  .book-tab.active {
    background: var(--accent);
  }

  .book-tab b {
    font-size: 15px;
    line-height: 1.1;
  }

  .book-tab span {
    color: rgba(255,255,255,0.8);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 11px;
    font-weight: 700;
    line-height: 1.15;
    overflow-wrap: anywhere;
  }

  .workbench {
    display: grid;
    grid-template-columns: 272px minmax(0, 1fr);
    min-height: calc(100vh - 292px);
  }

  .sidebar {
    padding: 18px;
    border-right: 4px solid var(--line);
    background:
      radial-gradient(circle, rgba(255,255,255,0.38) 0 2px, transparent 3px) 0 0 / 18px 18px,
      #f9f2c6;
  }

  .shelf-title {
    margin: 0 0 14px;
    padding: 11px 12px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--small-shadow);
    font-size: 14px;
  }

  .unit-list {
    display: grid;
    gap: 10px;
  }

  .unit-btn {
    display: grid;
    grid-template-columns: 38px minmax(0, 1fr);
    gap: 10px;
    align-items: center;
    width: 100%;
    padding: 10px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--small-shadow);
    cursor: pointer;
    text-align: left;
  }

  .unit-btn:hover,
  .unit-btn.active {
    transform: translateY(-2px);
    background: var(--accent-soft);
  }

  .unit-btn.active {
    outline: 4px solid var(--accent);
  }

  .unit-index {
    display: grid;
    place-items: center;
    width: 38px;
    height: 38px;
    border: 3px solid var(--line);
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-weight: 900;
  }

  .unit-btn b {
    display: block;
    font-size: 15px;
    line-height: 1.1;
  }

  .unit-btn span:last-child {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 12px;
    font-weight: 700;
  }

  .main {
    min-width: 0;
    padding: 22px;
    background:
      radial-gradient(circle at 12px 12px, rgba(23,21,31,0.08) 0 3px, transparent 4px) 0 0 / 32px 32px,
      #fff8d8;
  }

  .worksheet {
    position: relative;
    padding: 20px;
    border: 4px solid var(--orange);
    border-radius: var(--radius);
    background: var(--paper);
    box-shadow: var(--shadow);
  }

  .worksheet::before {
    content: "";
    position: absolute;
    inset: 8px;
    pointer-events: none;
    border: 2px dashed rgba(255, 38, 61, 0.48);
    border-radius: var(--radius);
  }

  .unit-hero {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 18px;
    align-items: center;
    margin-bottom: 20px;
  }

  .unit-label {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    width: fit-content;
    margin-bottom: 10px;
    padding: 9px 16px;
    border: 3px solid var(--line);
    border-radius: 999px;
    background: #19aaf2;
    color: #fff;
    box-shadow: var(--small-shadow);
    font-size: 15px;
    font-weight: 900;
  }

  .unit-label span {
    display: inline-grid;
    place-items: center;
    width: 27px;
    height: 27px;
    border-radius: 50%;
    background: #fff;
    color: var(--accent);
  }

  .unit-hero h2 {
    margin: 0;
    font-size: clamp(30px, 5vw, 62px);
    line-height: 0.95;
  }

  .unit-meta {
    margin-top: 8px;
    color: var(--muted);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 14px;
    font-weight: 800;
  }

  .focus-card {
    display: grid;
    place-items: center;
    min-width: 160px;
    min-height: 118px;
    padding: 14px 22px;
    border: 4px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--shadow);
  }

  .focus-card .focus {
    color: var(--accent);
    font-size: clamp(46px, 8vw, 78px);
    font-weight: 900;
    line-height: 0.9;
  }

  .focus-card .caption {
    margin-top: 8px;
    color: var(--muted);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 12px;
    font-weight: 800;
  }

  .mode-row {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
  }

  .mode-tab,
  .utility-btn {
    min-height: 42px;
    padding: 9px 15px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--small-shadow);
    cursor: pointer;
    font-weight: 900;
  }

  .mode-tab:hover,
  .utility-btn:hover {
    transform: translateY(-2px);
  }

  .mode-tab.active {
    background: var(--accent);
    color: #fff;
  }

  .utility-btn {
    margin-left: auto;
    background: var(--sun);
  }

  .pattern-strip {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }

  .pattern-chip {
    padding: 7px 12px;
    border: 3px solid var(--line);
    border-radius: 999px;
    background: #fff;
    color: var(--accent);
    box-shadow: 0 3px 0 rgba(23, 21, 31, 0.12);
    font-size: 15px;
    font-weight: 900;
  }

  .word-grid,
  .challenge-grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
  }

  .word-card,
  .challenge-card {
    min-height: 126px;
    border: 4px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--small-shadow);
  }

  .word-card {
    display: grid;
    grid-template-rows: 32px 1fr;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .word-card:hover,
  .word-card.playing {
    transform: translateY(-4px);
    box-shadow: 0 10px 0 rgba(23, 21, 31, 0.18);
  }

  .word-card.playing {
    outline: 5px solid var(--sun);
  }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 8px;
    background: var(--accent-soft);
    border-bottom: 3px solid var(--line);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 12px;
    font-weight: 900;
  }

  .sound-dot {
    display: inline-grid;
    place-items: center;
    width: 22px;
    height: 22px;
    border: 2px solid var(--line);
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 11px;
  }

  .word-body {
    display: grid;
    place-items: center;
    padding: 15px 10px 18px;
  }

  .word {
    display: block;
    max-width: 100%;
    text-align: center;
    overflow-wrap: anywhere;
    word-break: normal;
    white-space: normal;
    font-size: clamp(32px, 3vw, 48px);
    font-weight: 900;
    line-height: 1.02;
  }

  .word.is-medium {
    font-size: clamp(28px, 2.7vw, 42px);
  }

  .word.is-long {
    font-size: clamp(22px, 2.35vw, 34px);
    line-height: 1.08;
  }

  .mark {
    color: var(--accent);
  }

  .blank-char {
    color: rgba(23, 21, 31, 0.42);
  }

  .selected-panel {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 16px;
    align-items: center;
    margin-bottom: 16px;
    padding: 16px;
    border: 4px solid var(--line);
    border-radius: var(--radius);
    background: linear-gradient(90deg, #fff 0%, #fff9c7 100%);
    box-shadow: var(--small-shadow);
  }

  .selected-word {
    display: block;
    max-width: 100%;
    overflow-wrap: anywhere;
    word-break: normal;
    white-space: normal;
    font-size: clamp(44px, 7vw, 82px);
    font-weight: 900;
    line-height: 0.95;
  }

  .selected-word.is-medium {
    font-size: clamp(38px, 5.8vw, 68px);
  }

  .selected-word.is-long {
    font-size: clamp(30px, 4.4vw, 52px);
    line-height: 1.02;
  }

  .selected-meta {
    margin-top: 8px;
    color: var(--muted);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-weight: 800;
  }

  .play-big {
    display: grid;
    place-items: center;
    width: 78px;
    height: 78px;
    border: 4px solid var(--line);
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    box-shadow: var(--small-shadow);
    cursor: pointer;
    font-size: 34px;
    font-weight: 900;
  }

  .challenge-card {
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
  }

  .challenge-card.correct {
    outline: 5px solid #7bd62d;
  }

  .challenge-card.wrong {
    outline: 5px solid #ff263d;
  }

  .challenge-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-height: 42px;
    padding: 5px 8px 5px 10px;
    border-bottom: 3px solid var(--line);
    background: var(--accent-soft);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 12px;
    font-weight: 900;
  }

  .listen-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    min-width: 92px;
    min-height: 32px;
    padding: 4px 10px;
    border: 3px solid var(--line);
    border-radius: 999px;
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 0 rgba(23, 21, 31, 0.16);
    cursor: pointer;
    font-size: 13px;
    font-weight: 900;
  }

  .listen-btn:hover,
  .listen-btn:focus-visible {
    transform: translateY(-1px);
    background: #078fda;
  }

  .listen-icon {
    font-size: 14px;
    line-height: 1;
  }

  .challenge-form {
    display: grid;
    gap: 8px;
    align-content: center;
    padding: 12px 10px 10px;
  }

  .challenge-input {
    width: 100%;
    min-height: 46px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    text-align: center;
    font-size: 20px;
    font-weight: 900;
    outline: 0;
  }

  .challenge-input:focus {
    background: #fff6b8;
  }

  .challenge-input::placeholder {
    color: #77727e;
    font-size: 14px;
    font-weight: 700;
  }

  .answer-feedback {
    min-height: 18px;
    color: var(--muted);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 12px;
    font-weight: 900;
    text-align: center;
  }

  .challenge-card.correct .answer-feedback {
    color: #348500;
  }

  .challenge-card.wrong .answer-feedback {
    color: #d50a27;
  }

  .check-btn {
    min-height: 38px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: #19aaf2;
    color: #fff;
    box-shadow: 0 3px 0 rgba(23, 21, 31, 0.15);
    cursor: pointer;
    font-size: 14px;
    font-weight: 900;
  }

  .score-board {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 14px;
  }

  .score-pill {
    padding: 8px 12px;
    border: 3px solid var(--line);
    border-radius: 999px;
    background: #fff;
    box-shadow: var(--small-shadow);
    font-weight: 900;
  }

  .score-pill b {
    color: var(--accent);
  }

  .complete {
    display: none;
    position: relative;
    z-index: 1;
    margin-bottom: 14px;
    padding: 14px;
    border: 4px solid var(--line);
    border-radius: var(--radius);
    background: var(--lime);
    color: #fff;
    box-shadow: var(--small-shadow);
    font-size: 18px;
    font-weight: 900;
    text-align: center;
    text-shadow: 0 2px 0 rgba(23, 21, 31, 0.26);
  }

  .complete.show {
    display: block;
  }

  .reward-dashboard {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1.2fr) minmax(0, .8fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .mission-board,
  .badge-board {
    padding: 13px;
    border: 3px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--small-shadow);
  }

  .reward-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
    font-weight: 900;
  }

  .mission-list {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .mission-item {
    min-width: 0;
    padding: 9px;
    border: 2px solid var(--line);
    border-radius: 6px;
    background: #f7f8fb;
  }

  .mission-item.done {
    background: #e8ffd2;
  }

  .mission-item b,
  .mission-item span {
    display: block;
    overflow-wrap: anywhere;
  }

  .mission-item b {
    font-size: 12px;
  }

  .mission-item span {
    margin-top: 3px;
    color: var(--muted);
    font: 800 11px "Segoe UI", system-ui, sans-serif;
  }

  .mission-progress {
    height: 7px;
    margin-top: 7px;
    overflow: hidden;

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const authClient = window.supabase && window.ZOOPS_SUPABASE
  ? window.supabase.createClient(
      window.ZOOPS_SUPABASE.url,
      window.ZOOPS_SUPABASE.publishableKey
    )
  : null;
const studentSignOut = document.getElementById("studentSignOut");
const playerHud = document.getElementById("playerHud");
const levelChip = document.getElementById("levelChip");
const xpFill = document.getElementById("xpFill");
const streakChip = document.getElementById("streakChip");
const levelPop = document.getElementById("levelPop");
const levelPopCard = document.getElementById("levelPopCard");
let learnerProfile = null;
let activeLearningSessionId = null;
let activeLearningSessionPromise = null;
let learningSessionCompleted = false;
let studySeenWords = new Set();
let spellingAttemptCounts = {};
let activeStudySeconds = 0;
let activeSessionTodayBase = 0;
let lastActivityAt = 0;
let lastActivityTickAt = 0;
const LEARNING_IDLE_LIMIT_MS = 60000;
let gameState = {
  xp: 0,
  level: 1,
  level_xp: 0,
  streak_days: 0,
  today_seconds: 0,
  today_listen_correct: 0,
  today_spelling_correct: 0,
  badges: []
};

async function initializeStudentSession() {
  if (!authClient) return;

  const { data: { session } } = await authClient.auth.getSession();
  studentSignOut.hidden = !session;
  if (!session) return;

  const { data: student } = await authClient
    .from("students")
    .select("id, academy_id, english_name")
    .eq("auth_user_id", session.user.id)
    .eq("status", "active")
    .maybeSingle();

  learnerProfile = student;
  if (learnerProfile) {
    playerHud.hidden = false;
    await loadGameState();
  }
}

studentSignOut.addEventListener("click", async () => {
  if (!authClient) {
    window.location.href = "portal.html";
    return;
  }

  studentSignOut.disabled = true;
  studentSignOut.textContent = "로그아웃 중...";
  await finishActiveLearningSession(false);
  const { error } = await authClient.auth.signOut();

  if (error) {
    studentSignOut.disabled = false;
    studentSignOut.textContent = "로그아웃";
    window.alert(`로그아웃하지 못했습니다: ${error.message}`);
    return;
  }

  window.location.replace("portal.html");
});

const state = {
  book: "Section 1",
  unitIndex: 0,
  mode: "study",
  selectedIndex: 0,
  answers: {},
  checked: {},
  listenIndex: 0,
  listenTokens: [],
  listenTiles: [],
  listenSelectedIds: [],
  listenAttempts: 1,
  listenStatus: "ready",
  listenCompleted: {}
};

const GOOGLE_TTS_VOICE_NAMES = [
  "Google US English",
  "Google UK English Female",
  "Google UK English Male"
];
const WORD_AUDIO_BASE = "audio/words/";
const WORD_AUDIO_VERSION = "emma-20260624-2";
let selectedTtsVoice = null;
let ttsPlaybackId = 0;
let activeWordAudio = null;
let recordedRepeatTimer = 0;
const wordAudioCache = new Map();

function currentBook() {
  return PHONICS_DATA[state.book];
}

function currentUnit() {
  return currentBook().units[state.unitIndex];
}

function currentUnitKey() {
  return `${state.book}:${state.unitIndex + 1}`;
}

async function loadGameState(render = true) {
  if (!authClient || !learnerProfile) return;
  const { data, error } = await authClient.rpc("get_student_game_state");
  if (error || !data) {
    console.warn("Game state could not load:", error?.message);
    return;
  }
  gameState = data;
  updatePlayerHud();
  if (render) renderMain();
}

function updatePlayerHud() {
  levelChip.textContent = `Lv. ${gameState.level}`;
  xpFill.style.width = `${Math.min(100, gameState.level_xp)}%`;
  streakChip.textContent = `Streak ${gameState.streak_days}일`;
}

function applyRewardResult(result) {
  if (!result) return;
  const previousLevel = gameState.level || 1;
  gameState.xp = Number(result.xp ?? gameState.xp);
  gameState.level = Math.floor(gameState.xp / 100) + 1;
  gameState.level_xp = gameState.xp % 100;
  gameState.streak_days = Number(result.streak_days ?? gameState.streak_days);
  updatePlayerHud();

  if (gameState.level > previousLevel) {
    showLevelPop(`Pop! Level ${gameState.level}`);
  } else if (Number(result.awarded_points) > 0) {
    showLevelPop(`Pop! +${result.awarded_points} XP`);
  }

  if (result.unit_badge_earned) {
    window.setTimeout(() => showLevelPop("New Sound Monster!"), 850);
  } else if (result.section_badge_earned) {
    window.setTimeout(() => showLevelPop("Phonics Hero Badge!"), 850);
  }
}

function showLevelPop(text) {
  levelPopCard.textContent = text;
  levelPop.classList.remove("show");
  void levelPop.offsetWidth;
  levelPop.classList.add("show");
  playPopEffect();
  window.setTimeout(() => levelPop.classList.remove("show"), 1300);
}

function playPopEffect(isComplete = false) {
  try {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) return;
    const context = new AudioContextClass();
    const oscillator = context.createOscillator();
    const popOscillator = context.createOscillator();
    const gain = context.createGain();
    const popGain = context.createGain();
    const noise = context.createBufferSource();
    const noiseGain = context.createGain();
    const noiseBuffer = context.createBuffer(
      1,
      Math.floor(context.sampleRate * .045),
      context.sampleRate
    );
    const noiseData = noiseBuffer.getChannelData(0);
    for (let index = 0; index < noiseData.length; index += 1) {
      noiseData[index] = (Math.random() * 2 - 1) * (1 - index / noiseData.length);
    }
    noise.buffer = noiseBuffer;

    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(isComplete ? 430 : 360, context.currentTime);
    oscillator.frequency.exponentialRampToValueAtTime(
      isComplete ? 980 : 720,
      context.currentTime + .13
    );
    gain.gain.setValueAtTime(isComplete ? .16 : .12, context.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, context.currentTime + .24);

    popOscillator.type = "triangle";
    popOscillator.frequency.setValueAtTime(150, context.currentTime);
    popOscillator.frequency.exponentialRampToValueAtTime(85, context.currentTime + .09);
    popGain.gain.setValueAtTime(.11, context.currentTime);
    popGain.gain.exponentialRampToValueAtTime(.001, context.currentTime + .11);

    noiseGain.gain.setValueAtTime(.055, context.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(.001, context.currentTime + .045);

    oscillator.connect(gain);
    popOscillator.connect(popGain);
    noise.connect(noiseGain);
    gain.connect(context.destination);
    popGain.connect(context.destination);
    noiseGain.connect(context.destination);
    oscillator.start();
    popOscillator.start();
    noise.start();
    oscillator.stop(context.currentTime + .23);
    popOscillator.stop(context.currentTime + .12);
    noise.stop(context.currentTime + .05);
    oscillator.onended = () => context.close();
  } catch {}
}

function playWrongEffect() {
  try {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) return;
    const context = new AudioContextClass();
    const oscillator = context.createOscillator();
    const gain = context.createGain();
    oscillator.type = "triangle";
    oscillator.frequency.setValueAtTime(210, context.currentTime);
    oscillator.frequency.linearRampToValueAtTime(150, context.currentTime + .12);
    gain.gain.setValueAtTime(.07, context.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, context.currentTime + .16);
    oscillator.connect(gain);
    gain.connect(context.destination);
    oscillator.start();
    oscillator.stop(context.currentTime + .17);
    oscillator.onended = () => context.close();
  } catch {}
}

function renderRewardDashboard() {
  if (!learnerProfile) return "";
  const missionSeconds = Math.min(300, Number(gameState.today_seconds) || 0);
  const listenCount = Math.min(5, Number(gameState.today_listen_correct) || 0);
  const spellingCount = Math.min(3, Number(gameState.today_spelling_correct) || 0);
  const badges = Array.isArray(gameState.badges) ? gameState.badges.slice(0, 6) : [];
  const badgeColors = ["#7bd62d", "#17b7f1", "#ff9f1c", "#ff5c72", "#9f7aea", "#ffe14d"];

  return `
    <div class="reward-dashboard">
      <section class="mission-board">
        <div class="reward-title">
          <span>오늘의 미션</span>
          <span>${missionSeconds >= 300 && listenCount >= 5 && spellingCount >= 3 ? "Mission Clear!" : "작게, 매일!"}</span>
        </div>
        <div class="mission-list">
          ${renderMissionItem("활동 학습 5분", missionSeconds, 300, formatGameTime(missionSeconds))}
          ${renderMissionItem("Listen 정답 5개", listenCount, 5, `${listenCount}/5`)}
          ${renderMissionItem("Spelling 정답 3개", spellingCount, 3, `${spellingCount}/3`)}
        </div>
      </section>
      <section class="badge-board">
        <div class="reward-title">
          <span>몬스터 배지</span>
          <span>${gameState.badges?.length || 0}개</span>
        </div>
        <div class="badge-preview">
          ${badges.length ? badges.map((badge, index) => `
            <div class="monster-badge" style="--badge-color:${badgeColors[index % badgeColors.length]}" title="${escapeHtml(badge.badge_name)}">
              <div class="monster-face"></div>
              <small>${escapeHtml(badge.badge_name)}</small>
            </div>
          `).join("") : `<div class="badge-empty">Listen & Select Unit을 완료하면<br>Sound Monster를 만나요.</div>`}
        </div>
      </section>
    </div>
  `;
}

function renderMissionItem(label, value, target, text) {
  const percent = Math.min(100, Math.round((value / target) * 100));
  return `
    <div class="mission-item ${value >= target ? "done" : ""}">
      <b>${escapeHtml(label)}</b>
      <span>${escapeHtml(text)}</span>
      <div class="mission-progress"><i style="width:${percent}%"></i></div>
    </div>
  `;
}

function formatGameTime(seconds) {
  const safe = Math.max(0, Number(seconds) || 0);
  return `${Math.floor(safe / 60)}분 ${safe % 60}초`;
}

async function beginLearningSession() {
  if (!authClient || !learnerProfile || learningSessionCompleted) return null;
  if (activeLearningSessionId) return activeLearningSessionId;
  if (activeLearningSessionPromise) return activeLearningSessionPromise;

  const unit = currentUnit();
  const context = {
    sectionKey: state.book,
    unitKey: currentUnitKey(),
    unitName: unit.name,
    mode: state.mode === "spell" ? "spelling" : "study",
    totalCount: unit.words.length,
  };

  activeLearningSessionPromise = authClient.rpc("start_learning_session", {
    p_section_key: context.sectionKey,
    p_unit_key: context.unitKey,
    p_unit_name: context.unitName,
    p_mode: context.mode,
    p_total_count: context.totalCount,
  }).then(({ data, error }) => {
    if (error) {
      console.warn("Learning session could not start:", error.message);
      return null;
    }
    activeLearningSessionId = data;
    activeSessionTodayBase = Number(gameState.today_seconds) || 0;
    return data;
  }).finally(() => {
    activeLearningSessionPromise = null;
  });

  return activeLearningSessionPromise;
}

async function finishActiveLearningSession(studyCompleted = false) {
  const sessionId = activeLearningSessionId || await activeLearningSessionPromise;
  if (!sessionId || !authClient) return;

  updateActiveStudyClock();
  const elapsedSeconds = Math.round(activeStudySeconds);
  await authClient.rpc("touch_learning_session", {
    p_session_id: sessionId,
    p_elapsed_seconds: elapsedSeconds,
  });
  await authClient.rpc("finish_learning_session", {
    p_session_id: sessionId,
    p_study_board_completed: studyCompleted,
  });
  if (activeLearningSessionId === sessionId) {
    activeLearningSessionId = null;
    activeLearningSessionPromise = null;
    resetActivityClock();
  }
}

function resetLearningSessionState() {
  activeLearningSessionId = null;
  activeLearningSessionPromise = null;
  learningSessionCompleted = false;
  studySeenWords = new Set();
  spellingAttemptCounts = {};
  resetActivityClock();
}

function resetActivityClock() {
  activeStudySeconds = 0;
  activeSessionTodayBase = Number(gameState.today_seconds) || 0;
  lastActivityAt = 0;
  lastActivityTickAt = 0;
}

function noteLearningActivity() {
  if (!learnerProfile || learningSessionCompleted || document.hidden) return;
  const now = Date.now();
  updateActiveStudyClock(now);
  lastActivityAt = now;
  lastActivityTickAt = now;
  beginLearningSession();
}

function updateActiveStudyClock(now = Date.now(), countUntilNow = false) {
  if (!lastActivityAt || !lastActivityTickAt || (document.hidden && !countUntilNow)) {
    lastActivityTickAt = now;
    return;
  }
  const activeUntil = Math.min(now, lastActivityAt + LEARNING_IDLE_LIMIT_MS);
  if (activeUntil > lastActivityTickAt) {
    activeStudySeconds += (activeUntil - lastActivityTickAt) / 1000;
  }
  lastActivityTickAt = now;
}

async function saveLearningHeartbeat() {
  if (!authClient || !activeLearningSessionId) return;
  updateActiveStudyClock();
  await authClient.rpc("touch_learning_session", {
    p_session_id: activeLearningSessionId,
    p_elapsed_seconds: Math.round(activeStudySeconds),
  });
  gameState.today_seconds = activeSessionTodayBase + Math.round(activeStudySeconds);
  updatePlayerHud();
}

async function trackAudioReplay(word) {
  if (!learnerProfile || learningSessionCompleted) return;
  const sessionId = await beginLearningSession();

    p_session_id: sessionId,
    p_word: word,
  });
}

async function trackStudyWord(word) {
  if (!learnerProfile || state.mode !== "study" || learningSessionCompleted) return;
  studySeenWords.add(word);
  await beginLearningSession();

  if (studySeenWords.size >= currentUnit().words.length) {
    learningSessionCompleted = true;
    await finishActiveLearningSession(true);
  }
}

async function trackSpellingAttempt(word, isCorrect) {
  if (!learnerProfile || state.mode !== "spell" || learningSessionCompleted) return;
  const attemptNumber = (spellingAttemptCounts[word] || 0) + 1;
  spellingAttemptCounts[word] = attemptNumber;
  const unitFinished = currentUnit().words.every(
    (_, index) => state.checked[index] === true
  );
  const sessionId = await beginLearningSession();
  if (!sessionId) return;

  await authClient.rpc("record_word_attempt", {
    p_session_id: sessionId,
    p_word: word,
    p_is_correct: isCorrect,
    p_attempt_number: attemptNumber,
  });

  if (isCorrect) {
    const { data } = await authClient.rpc("award_spelling_success", {
      p_section_key: state.book,
      p_unit_key: currentUnitKey(),
      p_word: word,
    });
    applyRewardResult(data);
    await loadGameState(false);
  }

  if (unitFinished) {
    learningSessionCompleted = true;
    await finishActiveLearningSession(false);
  }
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function getMarkedLetters(word, unit) {
  const lower = word.toLowerCase();
  const marked = Array(word.length).fill(false);

  if (unit.split) {
    const firstIndex = lower.indexOf(unit.split[0]);
    const lastIndex = lower.lastIndexOf(unit.split[1]);
    if (firstIndex >= 0) marked[firstIndex] = true;
    if (lastIndex > firstIndex) marked[lastIndex] = true;
  }

  const patterns = [...(unit.patterns || [])].sort((a, b) => b.length - a.length);
  for (const pattern of patterns) {
    let start = 0;
    while (pattern && start < lower.length) {
      const index = lower.indexOf(pattern.toLowerCase(), start);
      if (index === -1) break;
      for (let i = index; i < index + pattern.length; i += 1) marked[i] = true;
      start = index + Math.max(pattern.length, 1);
    }
  }

  return marked;
}

function markWord(word, unit) {
  const marked = getMarkedLetters(word, unit);
  return word.split("").map((letter, index) => (
    marked[index] ? `<span class="mark">${escapeHtml(letter)}</span>` : escapeHtml(letter)
  )).join("");
}

function getWordLengthClass(word) {
  if (word.length >= 10) return "is-long";
  if (word.length >= 8) return "is-medium";
  return "";
}

function prepareListenRound(index = 0) {
  const unit = currentUnit();
  state.listenIndex = Math.max(0, Math.min(index, unit.words.length - 1));
  const word = unit.words[state.listenIndex];
  state.listenTokens = tokenizeListenWord(word, unit);
  state.listenTiles = makeListenTiles(state.listenTokens, word);
  state.listenSelectedIds = [];
  state.listenAttempts = 1;
  state.listenStatus = "ready";
}

function tokenizeListenWord(word, unit) {
  const commonChunks = [
    "tch", "dge", "igh", "scr", "spl", "spr", "str",
    "sh", "ch", "th", "wh", "ph", "ck", "ng", "nk", "qu",
    "ee", "ea", "ai", "ay", "oa", "ow", "oi", "oy", "ou",
    "aw", "au", "oo", "er", "ir", "ur", "ar", "or"
  ];
  const patterns = [...new Set([
    ...(unit.patterns || []),
    ...(unit.split || []),
    ...commonChunks
  ])]
    .filter(pattern => pattern && !pattern.includes("_"))
    .sort((a, b) => b.length - a.length);
  const lower = word.toLowerCase();
  const tokens = [];
  let index = 0;

  while (index < lower.length) {
    const match = patterns.find(pattern => lower.startsWith(pattern.toLowerCase(), index));
    if (match) {
      tokens.push(lower.slice(index, index + match.length));
      index += match.length;
    } else {
      tokens.push(lower[index]);
      index += 1;
    }
  }
  return tokens;
}

function makeListenTiles(tokens, word) {
  const distractors = [
    "a", "e", "i", "o", "u", "b", "d", "f", "g", "m", "n", "p",
    "r", "s", "t", "sh", "ch", "th", "ee", "ay", "oo"
  ];
  const seed = [...word].reduce((sum, letter) => sum + letter.charCodeAt(0), 0);
  const extras = [];
  for (let offset = 0; extras.length < 3 && offset < distractors.length; offset += 1) {
    const item = distractors[(seed + offset * 5) % distractors.length];
    if (!tokens.includes(item) && !extras.includes(item)) extras.push(item);
  }
  const values = [...tokens, ...extras];
  return values
    .map((text, index) => ({
      id: `${state.listenIndex}-${index}-${text}`,
      text,
      order: (seed * (index + 3) + index * 17) % 101
    }))
    .sort((a, b) => a.order - b.order);
}

function selectListenTile(tileId) {
  noteLearningActivity();
  if (state.listenStatus === "correct") return;
  const tile = state.listenTiles.find(item => item.id === tileId);
  if (!tile || state.listenSelectedIds.includes(tileId)) return;

  const expected = state.listenTokens[state.listenSelectedIds.length];
  if (tile.text !== expected) {
    state.listenAttempts += 1;
    state.listenStatus = "wrong";
    renderMain();
    playWrongEffect();
    window.setTimeout(() => {
      state.listenSelectedIds = [];
      state.listenStatus = "ready";
      renderMain();
      playWord(currentUnit().words[state.listenIndex], { spelling: true });
    }, 650);
    return;
  }

  state.listenSelectedIds.push(tileId);
  const filledIndex = state.listenSelectedIds.length - 1;
  if (state.listenSelectedIds.length < state.listenTokens.length) {
    state.listenStatus = "ready";
    renderMain();
    window.requestAnimationFrame(() => animateListenPop(filledIndex, false));
    return;
  }

  state.listenStatus = "correct";
  const word = currentUnit().words[state.listenIndex];
  state.listenCompleted[word] = true;
  renderMain();
  window.requestAnimationFrame(() => animateListenPop(filledIndex, true));
  completeListenWord(word);
}

function animateListenPop(slotIndex, isComplete) {
  const slot = document.querySelector(`.listen-slot[data-slot-index="${slotIndex}"]`);
  const layer = document.getElementById("listenPopLayer");
  const game = document.querySelector(".listen-game");
  if (!slot || !layer || !game) {
    playPopEffect(isComplete);
    return;
  }

  slot.classList.remove("pop-hit");
  void slot.offsetWidth;
  slot.classList.add("pop-hit");

  const slotRect = slot.getBoundingClientRect();
  const gameRect = game.getBoundingClientRect();
  const x = slotRect.left - gameRect.left + slotRect.width / 2;
  const y = slotRect.top - gameRect.top + slotRect.height / 2 + 85;
  const colors = ["#ff263d", "#17b7f1", "#7bd62d", "#ffe500", "#ff9f1c", "#9f7aea"];

  const popWord = document.createElement("span");
  popWord.className = `pop-word${isComplete ? " is-complete" : ""}`;
  popWord.textContent = isComplete ? "POP!" : "Pop!";
  popWord.style.setProperty("--pop-x", `${x}px`);
  popWord.style.setProperty("--pop-y", `${y}px`);
  layer.appendChild(popWord);

  const sparkCount = isComplete ? 12 : 7;
  for (let index = 0; index < sparkCount; index += 1) {
    const angle = (Math.PI * 2 * index) / sparkCount - Math.PI / 2;
    const distance = (isComplete ? 52 : 35) + (index % 3) * 8;
    const spark = document.createElement("i");
    spark.className = "pop-spark";
    spark.style.setProperty("--pop-x", `${x}px`);
    spark.style.setProperty("--pop-y", `${y}px`);
    spark.style.setProperty("--spark-x", `${Math.cos(angle) * distance}px`);
    spark.style.setProperty("--spark-y", `${Math.sin(angle) * distance}px`);
    spark.style.setProperty("--spark-rotate", `${90 + index * 37}deg`);
    spark.style.setProperty("--spark-color", colors[index % colors.length]);
    layer.appendChild(spark);
    window.setTimeout(() => spark.remove(), 850);
  }

  playPopEffect(isComplete);
  window.setTimeout(() => {
    popWord.remove();
    slot.classList.remove("pop-hit");
  }, isComplete ? 900 : 700);
}

  }, 900);
}

function checkAnswer(index) {
  noteLearningActivity();
  const unit = currentUnit();
  const input = document.getElementById(`answer-${index}`);
  if (!input) return;
  const expected = unit.words[index].toLowerCase();
  const actual = input.value.trim().toLowerCase();
  state.answers[index] = input.value;
  state.checked[index] = actual === expected;
  trackSpellingAttempt(unit.words[index], state.checked[index]);
  renderMain();

  window.setTimeout(() => {
    if (state.checked[index]) {
      const nextIndex = unit.words.findIndex((_, idx) => state.checked[idx] !== true);
      const nextInput = document.getElementById(`answer-${nextIndex}`);
      if (nextInput) {
        nextInput.focus();
        playSpellingWord(nextIndex);
      }
      return;
    }

    const retryInput = document.getElementById(`answer-${index}`);
    if (retryInput) {
      retryInput.focus();
      retryInput.select();
    }
    playSpellingWord(index);
  }, 180);
}

function resetSpell() {
  finishActiveLearningSession(false);
  state.answers = {};
  state.checked = {};
  resetLearningSessionState();
  renderMain();
  noteLearningActivity();
  window.setTimeout(() => playSpellingWord(0), 120);
}

async function playWord(text, options = {}) {
  const word = String(text || "").toLowerCase().trim();
  if (!word) return;
  noteLearningActivity();
  trackAudioReplay(word);

  const playbackId = ++ttsPlaybackId;
  stopRecordedAudio();
  if ("speechSynthesis" in window) window.speechSynthesis.cancel();

  const recordedStarted = await playRecordedWord(word, options, playbackId);
  if (recordedStarted || playbackId !== ttsPlaybackId) return;
  if (!("speechSynthesis" in window)) return;

  const voice = await getConsistentGoogleVoice();
  if (!options.spelling) {
    speakUtterance(`${word}.`, voice, 0.8);
    return;
  }

  const firstPass = speakUtterance(`${word}.`, voice, 0.72);
  firstPass.onend = () => {
    window.setTimeout(() => {
      if (playbackId !== ttsPlaybackId) return;
      speakUtterance(`${word}.`, voice, 0.62);
    }, 180);
  };
}

async function playRecordedWord(word, options, playbackId) {
  const firstPass = getWordAudio(word);
  firstPass.onended = null;
  firstPass.currentTime = 0;
  activeWordAudio = firstPass;

  if (options.spelling) {
    firstPass.onended = () => {
      recordedRepeatTimer = window.setTimeout(() => {
        if (playbackId !== ttsPlaybackId) return;
        firstPass.onended = null;
        firstPass.currentTime = 0;
        activeWordAudio = firstPass;
        firstPass.play().catch(() => {});
      }, 180);
    };
  }

  try {
    await firstPass.play();
    return true;
  } catch (error) {
    if (activeWordAudio === firstPass) activeWordAudio = null;
    return false;
  }
}

function getWordAudio(word) {
  const key = String(word || "").toLowerCase().trim();
  if (wordAudioCache.has(key)) return wordAudioCache.get(key);

  const audio = new Audio(
    `${WORD_AUDIO_BASE}${encodeURIComponent(key)}.mp3?v=${WORD_AUDIO_VERSION}`
  );
  audio.preload = "auto";
  wordAudioCache.set(key, audio);
  return audio;
}

function preloadCurrentUnitAudio() {
  const unit = currentUnit();
  if (!unit) return;
  unit.words.forEach(word => {
    const audio = getWordAudio(word);
    if (audio.readyState === HTMLMediaElement.HAVE_NOTHING) {
      audio.load();
    }
  });
}

function stopRecordedAudio() {
  window.clearTimeout(recordedRepeatTimer);
  recordedRepeatTimer = 0;
  if (!activeWordAudio) return;
  activeWordAudio.onended = null;
  activeWordAudio.pause();
  activeWordAudio.currentTime = 0;
  activeWordAudio = null;
}

function speakUtterance(text, voice, rate) {
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = voice ? voice.lang : "en-US";
  utterance.rate = rate;
  utterance.pitch = 1;
  utterance.volume = 1;
  if (voice) utterance.voice = voice;
  window.speechSynthesis.speak(utterance);
  return utterance;
}

function getConsistentGoogleVoice() {
  const voice = chooseGoogleVoice();
  if (voice && isPreferredTtsVoice(voice)) return Promise.resolve(voice);

  return new Promise(resolve => {
    let settled = false;
    const finish = () => {
      if (settled) return;
      settled = true;
      resolve(chooseGoogleVoice());
    };
    window.speechSynthesis.onvoiceschanged = finish;
    window.setTimeout(finish, 500);
  });
}

function chooseGoogleVoice() {
  const voices = window.speechSynthesis.getVoices();
  const chosen =
    GOOGLE_TTS_VOICE_NAMES.map(name => voices.find(voice => voice.name === name)).find(Boolean) ||
    voices.find(voice => voice.name.toLowerCase().includes("google") && voice.lang.startsWith("en")) ||
    voices.find(voice => /natural|online/i.test(voice.name) && voice.lang === "en-US") ||
    voices.find(voice => /natural|online/i.test(voice.name) && voice.lang.startsWith("en")) ||
    voices.find(voice => voice.lang === "en-US") ||
    voices.find(voice => voice.lang.startsWith("en"));
  if (chosen && (!selectedTtsVoice || isPreferredTtsVoice(chosen) || !isPreferredTtsVoice(selectedTtsVoice))) {
    selectedTtsVoice = chosen;
  }
  return selectedTtsVoice;
}

function isPreferredTtsVoice(voice) {
  return Boolean(
    voice &&
    voice.lang.startsWith("en") &&
    (voice.name.toLowerCase().includes("google") || /natural|online/i.test(voice.name))
  );
}

if ("speechSynthesis" in window) {
  window.speechSynthesis.getVoices();
}

renderApp();
initializeStudentSession();
window.setInterval(() => {
  updateActiveStudyClock();
  saveLearningHeartbeat();
}, 15000);
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") {
    updateActiveStudyClock(Date.now(), true);
    saveLearningHeartbeat();
    lastActivityAt = 0;
    lastActivityTickAt = 0;
  } else {
    lastActivityTickAt = Date.now();
  }
});
