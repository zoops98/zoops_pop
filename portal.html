<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zoops PoP Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #fff7cf;
      color: #17151f;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    .login-shell {
      width: min(100%, 460px);
      overflow: hidden;
      border: 4px solid #17151f;
      border-radius: 8px;
      background: #fff;
      box-shadow: 10px 10px 0 rgba(23,21,31,.18);
    }
    header {
      padding: 22px;
      background: #20bcec;
      border-bottom: 4px solid #17151f;
    }
    h1 { margin: 0; font-size: 40px; letter-spacing: 0; }
    h1 span {
      display: inline-block;
      padding: 0 7px;
      border: 3px solid #17151f;
      border-radius: 5px;
      background: #fff;
      color: #ff263d;
    }
    header p { margin: 6px 0 0; font-weight: 800; }
    .switcher {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 3px solid #17151f;
    }
    .switcher button {
      min-height: 50px;
      border: 0;
      background: #17151f;
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }
    .switcher button.active { background: #ff263d; }
    main { padding: 22px; }
    form { display: grid; gap: 13px; }
    label { display: grid; gap: 5px; font-weight: 900; }
    input,
    textarea {
      min-height: 48px;
      width: 100%;
      padding: 10px 12px;
      border: 3px solid #17151f;
      border-radius: 5px;
      font: inherit;
      font-weight: 700;
    }
    textarea {
      min-height: 86px;
      resize: vertical;
      line-height: 1.45;
    }
    .submit {
      min-height: 50px;
      border: 3px solid #17151f;
      border-radius: 5px;
      background: #ffe500;
      box-shadow: 0 4px 0 rgba(23,21,31,.2);
      cursor: pointer;
      font-size: 17px;
      font-weight: 900;
    }
    .secondary {
      min-height: 44px;
      border: 3px solid #17151f;
      border-radius: 5px;
      background: #fff;
      color: #126f9b;
      cursor: pointer;
      font-weight: 900;
    }
    .message {
      min-height: 22px;
      margin: 14px 0 0;
      color: #c9142e;
      font-weight: 800;
      text-align: center;
    }
    .message.ok { color: #2f9d59; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <section class="login-shell">
    <header>
      <h1>Zoops <span>PoP</span></h1>
      <p>Academy phonics learning</p>
    </header>
    <div class="switcher">
      <button id="ownerTab" class="active" type="button">원장님</button>
      <button id="studentTab" type="button">학생</button>
    </div>
    <main>
      <form id="ownerForm">
        <label>이메일
          <input id="ownerEmail" type="email" autocomplete="email" required>
        </label>
        <label>비밀번호
          <input id="ownerPassword" type="password" minlength="6" autocomplete="current-password" required>
        </label>
        <button class="submit" type="submit">로그인</button>
        <button id="ownerApply" class="secondary" type="button">학원장 신청하기</button>
      </form>
      <form id="applicationForm" class="hidden">
        <label>학원명
          <input id="applicationAcademyName" autocomplete="organization" required>
        </label>
        <label>희망 학원 코드
          <input id="applicationAcademyCode" inputmode="latin" placeholder="예: HAPPY01" required>
        </label>
        <label>원장님 이름
          <input id="applicationOwnerName" autocomplete="name" required>
        </label>
        <label>원장님 이메일
          <input id="applicationOwnerEmail" type="email" autocomplete="email" required>
        </label>
        <label>연락처
          <input id="applicationOwnerPhone" type="tel" autocomplete="tel" placeholder="선택 입력">
        </label>
        <label>예상 학생 수
          <input id="applicationExpectedStudents" type="number" min="1" max="5000" value="100" required>
        </label>
        <label>요청 메모
          <textarea id="applicationNote" placeholder="수업 시작 예정일, 요청 사항 등을 적어 주세요."></textarea>
        </label>
        <button class="submit" type="submit">신청서 보내기</button>
        <button id="backToLogin" class="secondary" type="button">로그인으로 돌아가기</button>
      </form>
      <form id="studentForm" class="hidden">
        <label>학원 코드
          <input id="academyCode" inputmode="latin" autocomplete="organization" required>
        </label>
        <label>학생 ID
          <input id="studentId" inputmode="latin" autocomplete="username" required>
        </label>
        <label>비밀번호
          <input id="studentPassword" type="password" minlength="6" autocomplete="current-password" required>
        </label>
        <button class="submit" type="submit">학습 시작</button>
      </form>
      <p id="message" class="message" aria-live="polite"></p>
    </main>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js"></script>
  <script>
    const client = supabase.createClient(
      ZOOPS_SUPABASE.url,
      ZOOPS_SUPABASE.publishableKey
    );
    const ownerTab = document.getElementById("ownerTab");
    const studentTab = document.getElementById("studentTab");
    const ownerForm = document.getElementById("ownerForm");
    const studentForm = document.getElementById("studentForm");
    const applicationForm = document.getElementById("applicationForm");
    const message = document.getElementById("message");
    const portalUrl = new URL("portal.html", window.location.href).href;

    async function finishEmailConfirmation() {
      const url = new URL(window.location.href);
      const code = url.searchParams.get("code");

      if (code) {
        message.textContent = "이메일 확인을 완료하는 중입니다...";
        const { error } = await client.auth.exchangeCodeForSession(code);
        if (error) {
          message.textContent = `이메일 확인 오류: ${error.message}`;
          return;
        }
        window.history.replaceState({}, document.title, portalUrl);
      }

      const { data: { session } } = await client.auth.getSession();
      if (session) {
        window.location.replace("academy.html");
      }
    }

    function showMode(mode) {
      const owner = mode === "owner";
      ownerTab.classList.toggle("active", owner);
      studentTab.classList.toggle("active", !owner);
      ownerForm.classList.toggle("hidden", !owner);
      studentForm.classList.toggle("hidden", owner);
      applicationForm.classList.add("hidden");
      message.textContent = "";
      message.classList.remove("ok");
    }

    function showApplicationForm() {
      ownerTab.classList.remove("active");
      studentTab.classList.remove("active");
      ownerForm.classList.add("hidden");
      studentForm.classList.add("hidden");
      applicationForm.classList.remove("hidden");
      message.classList.remove("ok");
      message.textContent = "신청서를 보내면 최고 관리자가 확인 후 학원장 계정을 승인합니다.";
    }

    ownerTab.onclick = () => showMode("owner");
    studentTab.onclick = () => showMode("student");
    document.getElementById("ownerApply").onclick = showApplicationForm;
    document.getElementById("backToLogin").onclick = () => showMode("owner");

    ownerForm.onsubmit = async event => {
      event.preventDefault();
      message.textContent = "로그인 중...";
      const { error } = await client.auth.signInWithPassword({
        email: document.getElementById("ownerEmail").value.trim(),
        password: document.getElementById("ownerPassword").value,
      });
      if (error) {
        message.textContent = error.message;
        return;
      }
      location.href = "academy.html";
    };

    studentForm.onsubmit = async event => {
      event.preventDefault();
      message.textContent = "로그인 중...";
      const code = document.getElementById("academyCode").value.trim().toLowerCase();
      const id = document.getElementById("studentId").value.trim().toLowerCase();
      const { error } = await client.auth.signInWithPassword({
        email: `${code}.${id}@students.zoopspop.invalid`,
        password: document.getElementById("studentPassword").value,
      });
      if (error) {
        message.textContent = "학원 코드, 학생 ID 또는 비밀번호를 확인해 주세요.";
        return;
      }
      location.href = "phonics.html";
    };

    applicationForm.onsubmit = async event => {
      event.preventDefault();
      const submitButton = applicationForm.querySelector(".submit");
      submitButton.disabled = true;
      message.classList.remove("ok");
      message.textContent = "신청서를 보내는 중입니다...";

      const { error } = await client.rpc("submit_academy_owner_application", {
        p_academy_name: document.getElementById("applicationAcademyName").value.trim(),
        p_academy_code: document.getElementById("applicationAcademyCode").value.trim(),
        p_owner_name: document.getElementById("applicationOwnerName").value.trim(),
        p_owner_email: document.getElementById("applicationOwnerEmail").value.trim(),
        p_owner_phone: document.getElementById("applicationOwnerPhone").value.trim(),
        p_expected_students: Number(document.getElementById("applicationExpectedStudents").value),
        p_request_note: document.getElementById("applicationNote").value.trim(),
      });

      if (error) {
        message.textContent = error.message;
      } else {
        applicationForm.reset();
        document.getElementById("applicationExpectedStudents").value = 100;
        showMode("owner");
        message.classList.add("ok");
        message.textContent = "신청서가 접수되었습니다. 승인 후 안내 메일을 확인해 주세요.";
      }
      submitButton.disabled = false;
    };

    finishEmailConfirmation();
  </script>
</body>
</html>
